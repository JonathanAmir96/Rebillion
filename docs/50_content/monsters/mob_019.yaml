animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Presses flat against the alcove wall, barely a ripple of shadow."
  walk: "Slinks low and close along the wall once it has broken cover."
  jump: "Darts sideways in a short, crouched hop between shadows."
  fall: "Drops into a low crouch, knife already low and ready."
  attack: "Springs out of the alcove in one fast, silent knife-thrust."
  hit: "Twists away with a hiss, drawing back into a defensive crouch."
  die: "Slumps against the wall it once hid in, the knife slipping loose."
drop_table: drop_mob_019
flavor: "A rag-wrapped cutpurse who never left the undervault, more shadow than person now, pressed flat in a doorway alcove. The first cut comes from nowhere; once seen, it is only a cornered thief with a knife."
