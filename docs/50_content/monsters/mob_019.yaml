name: Undervault Skulk
tier: normal                     # ID slot 019 = R2 normal (ID_REGISTRY Monsters)
element: shadow                   # R2 mix is neutral/shadow (WORLD_PLAN R2)
weak_to: [arcane]                  # thematic; anti-shadow (ELEMENTS §2)
resists: [shadow]
level: 11
size_class: medium
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 11
  life: 784                     # 4*(11+3)^2
  power: 39                     # 6+3*11 (touch = round(0.5*power), §13.1)
  armor: 66                     # 6*11  (armor+warding sum = 132 = 12*11)
  warding: 66                     # 6*11
  precision: 44                 # 4*11
  evasion: 3.33                   # 3+0.03*11 (%)
  exp: 90                      # exp_per_kill_normal(11)=round(4*11^1.3) (LEVELING §3)
ai_profile: ambush_lurker
ai_params:                       # override only ambush_lurker-declared tunables (AI_BEHAVIOR)
