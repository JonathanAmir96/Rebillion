id: mob_231
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING, SKILL_SYSTEM, SKILL_EFFECTS]
name: Wraithpack Alpha
tier: elite                      # ID_REGISTRY: mob_227-233 = R11 elites (Lv 77-82)
element: shadow                     # WORLD_PLAN R11 mix: shadow/neutral
weak_to: [arcane]
resists: [shadow]
level: 80
size_class: medium
stats:                           # COMBAT_FORMULA §13 normal budget x §13.2 elite mults, Lv 80
  life: 165336                  # 4*(80+3)^2 x6
  power: 369                    # (6+3*80) x1.5
  armor: 624                   # 6*80 x1.3  (armor+warding sum = 1248)
  warding: 624                 # 6*80 x1.3
  precision: 352                # 4*80 x1.1
  evasion: 7.4                  # (3+0.03*80) +2 (§13.2 elite)
  exp: 5955                     # round(4*80^1.3) x5 (LEVELING §3 elite)
ai_profile: pack_hunter
ai_params:
  aggro_radius: 6
  pack_call_radius: 10
  pack_max_size: 5
abilities:
  - id: rallying_bay
    name: Rallying Bay
    targeting: { shape: aoe_circle, radius: 6, origin: self }
    cooldown: 14.0
    telegraph_s: 1.0
    animation_note: "The head-thrown-back rear and swelling throat announce the bay before it washes strength over the pack."
    effects:
      - { op: apply_status, status: empower, dur: 10 }
      - { op: apply_status, status: swiftness, dur: 10 }
  - id: summon_wraiths
    name: Call the Pack
    targeting: self
    cooldown: 20.0
    telegraph_s: 1.0
    animation_note: "It plants all four paws and howls into the surf, the sand behind it churning as fresh voidlings claw free."
    effects:
      - { op: summon_entity, entity_ref: mob_207, count: 2, dur: 30 }
animation_states: [idle, walk, jump, fall, attack, telegraph, hit, die, spawn]   # elite adds telegraph (VALIDATION §6) + spawn (SPAWN §6)
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Paces a tight circle, head thrown back in a silent, restless bay."
  walk: "Lopes ahead of its pack in a loose, ghostly stride, ears pricked."
  jump: "Springs across a gap in a smooth, weightless bound."
  fall: "Drifts down lighter than its bulk suggests, landing without a stumble."
  attack: "Snaps forward in a quick biting lunge, leading the pack's charge."
  telegraph: "Rears back and throws its head up, throat swelling before it bays."
  hit: "Flinches sideways with a snarl, form rippling at the impact."
  die: "Thins to a wisp on a final long bay and scatters into the dark."
  spawn: "Surges up out of the surf at the head of its howling pack."
drop_table: drop_mob_231
flavor: "The lead spectre of a hunting pack, baying its kin into a frenzy and calling fresh voidlings up from the surf to swarm the fallen."
