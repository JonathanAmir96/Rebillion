animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Sits upright and watchful, head raised above the rest of any nearby pack."
  walk: "Prowls forward in a heavy, unhurried gait, half again the size of an ordinary hunter."
  jump: "A powerful low bound, clearing ground the pack would take two steps to cross."
  fall: "Lands solidly on all four paws, weight settling forward."
  attack: "Drives in with a heavy, snapping bite that carries her full weight."
  hit: "Plants her stance and shakes off the blow with a low snarl."
  die: "Legs fold under her and she sinks down, head raised until the last."
  telegraph: "Throws her head back, chest swelling for the coming howl."
  spawn: "Bounds into view ahead of her pack and plants herself, surveying the field."
