name: Ember Revenant
tier: normal                     # ID slot 100 = R6 normal (ID_REGISTRY ashfall)
element: fire                      # R6 element mix is fire/neutral (WORLD_PLAN)
weak_to: [frost]                  # thematic (ELEMENTS §2; lists mutually exclusive)
resists: [fire]
level: 32
size_class: medium
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 32
  life: 4900                     # 4*(32+3)^2
  power: 102                     # 6+3*32 (touch = round(0.5*power), neutral, §13.1)
  armor: 192                     # 6*32  (armor+warding sum = 12*32)
  warding: 192                   # 6*32
  precision: 128                 # 4*32
  evasion: 4.0                   # 3 + 0.03*32 (%)
  exp: 362                       # exp_per_kill_normal(32)=round(4*32^1.3) (LEVELING §3)
ai_profile: ranged_skirmisher
ai_params:                       # override only ranged_skirmisher-declared tunables (AI_BEHAVIOR)
