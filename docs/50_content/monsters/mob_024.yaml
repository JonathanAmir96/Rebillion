animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands broad and scarred, surveying the vault with slow, deliberate weight."
  walk: "Prowls a short heavy patrol, claws scraping the flooded stone."
  jump: "Heaves itself over obstacles in a solid, weighty hop."
  fall: "Lands foursquare with a thud, its bulk settling immediately into a guard stance."
