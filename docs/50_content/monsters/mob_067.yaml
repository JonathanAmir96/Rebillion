id: mob_067
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING, SKILL_SYSTEM, SKILL_EFFECTS]
name: Tidecaller Morva
tier: boss                       # ID slot 067 = R4 boss (ID_REGISTRY Monsters)
element: frost
weak_to: [fire]
resists: [frost]
level: 22
size_class: large                # WORLD_PLAN R4 specifies `large` (not boss-size; knockback per §11 size mult 0.5)
stats:                           # §13 normal Lv 22 x §13.2 boss multipliers (region-boss row)
  life: 87500                    # 2500 x35
  power: 144                     # 72 x2.0 (touch = round(0.5*power), neutral, §13.1; contact-hot phases only)
  spellpower: 144                # parity (§13); her song and storm scale on magic
  armor: 211                     # 132 x1.6  (armor+warding sum ~= 12*22 x1.6 = 422)
  warding: 211                   # 132 x1.6
  precision: 106                 # 88 x1.2
  evasion: 3.66                  # 3.66 + 0 (bosses don't dodge, §13.2)
  exp: 5550                      # exp_per_kill_normal(22)=222 x25 (LEVELING §3 boss)
ai_profile: boss_scripted        # authored 2-phase fight (AI_BEHAVIOR §14-§15)
abilities:
  - id: siren_song
    name: Siren Song
    targeting: { shape: aoe_circle, radius: 6, origin: self }
    cooldown: 11.0
    telegraph_s: 1.4
    effects:
      - { op: pull }
      - { op: apply_status, status: chill, chance: 0.8, dur: 4 }
      - { op: apply_status, status: weaken, chance: 0.6, dur: 6 }
  - id: luring_dirge
    name: Luring Dirge
    targeting: { shape: line, length: 8, width: 2 }
    cooldown: 7.0
    telegraph_s: 1.1
    effects:
      - { op: deal_damage, element: frost, mult: 1.5 }
      - { op: apply_status, status: chill, chance: 0.6, dur: 3 }
  - id: tide_surge
    name: Tide Surge
    targeting: { shape: aoe_circle, radius: 4, origin: self }
    cooldown: 9.0
    telegraph_s: 1.2
    effects:
      - { op: deal_damage, element: frost, mult: 1.4 }
      - { op: knockback }
  - id: crashing_wave
    name: Crashing Wave
    targeting: { shape: aoe_circle, radius: 5, origin: self }
    cooldown: 8.0
    telegraph_s: 1.3
    effects:
      - { op: deal_damage, element: frost, mult: 1.8 }
      - { op: knockback }
  - id: frozen_gale
    name: Frozen Gale
    targeting: { shape: aoe_circle, radius: 5, origin: self }
    cooldown: 13.0
    telegraph_s: 1.5
    effects:
      - { op: deal_damage, element: frost, mult: 1.5 }
      - { op: apply_status, status: freeze, chance: 0.5, dur: 2 }
  - id: call_drowned
    name: Call the Drowned
    targeting: self
    cooldown: 24.0
    telegraph_s: 1.5
    effects:
      - { op: summon_entity, entity_ref: mob_060, count: 2, dur: 30 }
phases:                          # boss_scripted phase contract (AI_BEHAVIOR §15)
  - phase_id: 1                  # song: holds the shoal-rock, lures and chills from her perch
    life_threshold_pct: 100
    base_profile: territorial_guard
    added_abilities: [siren_song, luring_dirge, tide_surge]
  - phase_id: 2                  # storm: the sea itself turns; mobile, aggressive, raises the drowned
    life_threshold_pct: 50
    base_profile: aggressive_charger
    param_overrides: { charge_speed_mult: 2.8, charge_recover_s: 2.2 }
    added_abilities: [crashing_wave, frozen_gale, call_drowned]
    enter_telegraph: true        # plays phase_shift on entry (needs phase_shift state)
animation_states: [idle, walk, jump, fall, attack, cast, telegraph, hit, die, spawn, phase_shift]   # boss_scripted: +phase_shift (§8/§15)
drop_table: drop_mob_067
flavor: "A siren-priestess perched on the Siren Shoal's black rocks, her song sweet enough to steer whole crews onto the reef and cold enough to still their hearts before they drown. When her voice fails, she calls the storm and the drowned answer it."
