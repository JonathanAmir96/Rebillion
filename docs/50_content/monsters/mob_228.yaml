  fall: "Lands square-footed, plate settling with a heavy metallic clank."
  attack: "Swings its blade in a wide, disciplined arc meant to hold the line."
  telegraph: "Plants its feet and raises its blade high, plate locking rigid for the strike."
  hit: "Absorbs the blow without breaking stance, plate ringing dully."
  die: "Sinks to one knee and topples, plate settling motionless in the sand."
  spawn: "Rises from the drowned ranks and squares its shoulders to the field."
