name: Bilge Toad
tier: normal                     # ID slot 017 = R2 normal (ID_REGISTRY Monsters)
element: neutral                   # R2 mix is neutral/shadow (WORLD_PLAN R2)
level: 10
size_class: medium
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 10
  life: 676                     # 4*(10+3)^2
  power: 36                     # 6+3*10 (touch = round(0.5*power), §13.1)
  armor: 60                     # 6*10  (armor+warding sum = 120 = 12*10)
  warding: 60                     # 6*10
  precision: 40                 # 4*10
  evasion: 3.3                   # 3+0.03*10 (%)
  exp: 80                      # exp_per_kill_normal(10)=round(4*10^1.3) (LEVELING §3)
ai_profile: ranged_skirmisher
ai_params:                       # override only ranged_skirmisher-declared tunables (AI_BEHAVIOR)
  preferred_range_min: 4
