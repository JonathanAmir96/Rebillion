name: Rafter Bat
tier: normal                     # ID slot 016 = R2 normal (ID_REGISTRY Monsters)
element: shadow                   # R2 mix is neutral/shadow (WORLD_PLAN R2)
weak_to: [arcane]                  # thematic; anti-shadow (ELEMENTS §2)
resists: [shadow]
level: 9
size_class: medium
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 9
  life: 576                     # 4*(9+3)^2
  power: 33                     # 6+3*9 (touch = round(0.5*power), §13.1)
  armor: 54                     # 6*9  (armor+warding sum = 108 = 12*9)
  warding: 54                     # 6*9
  precision: 36                 # 4*9
  evasion: 3.27                   # 3+0.03*9 (%)
  exp: 70                      # exp_per_kill_normal(9)=round(4*9^1.3) (LEVELING §3)
ai_profile: aerial_swooper
ai_params:                       # override only aerial_swooper-declared tunables (AI_BEHAVIOR)
  patrol_altitude: 4
  swoop_speed_mult: 2.0
  climb_recover_s: 3
animation_states: [idle, walk, jump, fall, attack, hit, die]   # normal set; no telegraph/spawn
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Hangs folded and still from its rafter, wings wrapped tight against the lantern light."
  walk: "Beats a steady looping patrol along the vault's dark ceiling lane."
  jump: "Kicks off the rafter into an open-winged drop."
  fall: "Tucks its wings and plummets in a tight, controlled stoop."
  attack: "Peels out of its dive with claws splayed and a shrill screeching lunge."
  hit: "Jerks in the air, wings flaring wide to catch itself."
  die: "Folds mid-air and drops, wings crumpling as it falls."
drop_table: drop_mob_016
flavor: "A leather-winged rafter-bat that roosts in the lantern-lit vaults and hates the light it circles. It hangs high in the dark until it drops, all claws and shrill, then labors back up to its beam."
