  life: 127896                  # 21316 (§13 Lv70) * 6
  power: 324                    # 216 * 1.5
  armor: 546                   # 420 * 1.3  (armor+warding sum = 1092)
  warding: 546                 # 420 * 1.3
  precision: 308               # 280 * 1.1
  evasion: 7.10                # 5.10 + 2 (§13.2 elite)
  exp: 5010                    # exp_per_kill_normal(70)=1002 * 5 (LEVELING §3 elite)
ai_profile: aggressive_charger
