animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Hangs enormous and still, its wingspan shadowing the vault below."
  walk: "Sweeps through the water in slow, deliberate wingbeats."
  jump: "Tilts sharply upward, wings cupping for a steep climb."
  fall: "Folds and glides downward in a long, heavy arc."
  attack: "Tucks its wings and plunges in a crushing, straight dive."
  cast: "Arches its whole body, wingtips crackling with cold."
  telegraph: "Banks level and holds, wings spread wide before committing."
  hit: "Lists hard to one side, its wingbeat stuttering."
  die: "Goes rigid mid-glide and sinks without another beat."
  spawn: "Descends out of the dark above, wings unfurling to full span."
drop_table: drop_mob_126
flavor: "A ray grown vast and ancient in the lightless deep, its wingspan darkening a whole flooded vault as it wheels overhead. Each dive drags a wake of freezing water that stills everything it washes over."
