tier: normal                     # ID slot 108 = R7 Sunken normal (ID_REGISTRY Monsters)
element: frost                    # R7 split 10 frost / 4 shadow / 2 neutral (WORLD_PLAN)
weak_to: [fire]                  # thematic cold creature (ELEMENTS §2; mutually exclusive lists)
resists: [frost]
level: 30
size_class: small
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 30
  life: 4355                     # 4*(30+3)^2
  power: 96                      # 6+3*30 (touch = round(0.5*power), neutral, §13.1)
  armor: 180                     # 6*30  (armor+warding sum = 360 = 12*30)
  warding: 180                   # 6*30
  precision: 120                 # 4*30
  evasion: 3.9                   # 3 + 0.03*30 (%)
  exp: 333                       # exp_per_kill_normal(30)=round(4*30^1.3) (LEVELING §3)
