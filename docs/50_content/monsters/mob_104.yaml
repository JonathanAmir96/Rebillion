animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Hunches low, ember veins pulsing bright along her bulk with each breath."
  walk: "Lumbers forward in a heavy, swaying gait, trailing loose cinders."
  jump: "Bounds in a short, laboring hop that scatters embers from her hide."
  fall: "Lands heavy and wide-stanced, cinders puffing up around her feet."
  attack: "Snaps forward in a fast, wide-jawed bite."
  telegraph: "Rears back and swells, ember veins flaring brighter across her whole bulk."
  hit: "Recoils with a hiss, sparks shaking loose from her hide."
  die: "Sags and folds inward as her ember veins fade to dark."
  spawn: "Heaves up out of the ash in a burst of scattering cinders."
