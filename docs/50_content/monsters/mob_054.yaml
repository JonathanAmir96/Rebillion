id: mob_054
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING]
name: Frostbrine Lurker
tier: normal                     # ID slot 054 = R4 normal (ID_REGISTRY Monsters)
element: frost
weak_to: [fire]
resists: [frost]
level: 17
size_class: medium
stats:                           # all copied from COMBAT_FORMULA §13 normal budget, Lv 17
  life: 1600                     # 4*(17+3)^2
  power: 57                      # 6+3*17 (touch = round(0.5*power), neutral, §13.1)
  armor: 102                     # 6*17  (armor+warding sum = 204 = 12*17)
  warding: 102                   # 6*17
  precision: 68                  # 4*17
  evasion: 3.51                  # 3 + 0.03*17 (%)
  exp: 159                       # exp_per_kill_normal(17)=round(4*17^1.3) (LEVELING §3)
ai_profile: ambush_lurker        # burrows into the cold sand and erupts underfoot (AI_BEHAVIOR §7)
ai_params:                       # override only ambush_lurker-declared tunables
  ambush_radius: 2
  leash_radius: 3
  aggro_vertical_band: 1
animation_states: [idle, walk, jump, fall, attack, hit, die]   # normal set; no telegraph/spawn (elite/boss only)
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Lies flat and buried, only its eye-stalks breaking the surface of the sand."
  walk: "Drags itself forward low and flat, barely breaking the surface."
  jump: "A short flattening lunge that barely clears the ground."
  fall: "Settles back down flush against the sand as it lands."
  attack: "Erupts upward out of the sand and clamps its jaws shut."
  hit: "Flinches half out of its buried crouch, jaws snapping shut."
  die: "Sinks flat and still, eye-stalks drooping into the sand."
drop_table: drop_mob_054
flavor: "A flat, pallid crawler that beds down under the frozen strand with only its eye-stalks showing. The first you know of it is the cold clamp of its jaws around your ankle."
