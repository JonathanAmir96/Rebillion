id: mob_011
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, SKILL_SYSTEM, SKILL_EFFECTS, LEVELING]
name: Embermane Alpha
tier: elite                      # ID slot 011 = R1 elite (ID_REGISTRY Monsters)
element: fire                    # a flourished cinder-hound foreshadowing Cindermaw (WORLD_PLAN R1)
weak_to: [frost]                 # ELEMENTS §2; mutually exclusive lists
resists: [fire]
level: 8
size_class: large
stats:                           # normal Lv 8 budget x §13.2 elite multipliers
  life: 2910                     # 485 (§13 Lv 8) x 6
  power: 45                      # 30 x 1.5
  armor: 62                      # 48 x 1.3 (round)
  warding: 62                    # 48 x 1.3 (round); armor+warding sum = 124 ~= 96 x 1.3 = 124.8
  precision: 35                  # 32 x 1.1 (round)
  evasion: 5.2                   # 3.2% + 2% (§13.2 elite)
  exp: 300                       # exp_per_kill_normal(8)=60 x 5 (LEVELING §3 elite)
ai_profile: aggressive_charger   # a stronger, telegraphed charger with a cinder flourish (AI_BEHAVIOR §5)
ai_params:                       # override only aggressive_charger-declared tunables
  aggro_radius: 7
  charge_speed_mult: 2.4
  charge_recover_s: 2.6
abilities:                       # elite requires >=1 ability (SKILL_EFFECTS §17 monster kits)
  - id: ember_charge
    name: Ember Charge
    targeting: { shape: line, length: 6, width: 2 }   # SKILL_SYSTEM §6 line geometry
    cooldown: 7.0
    telegraph_s: 1.2             # generous wind-up; plays the telegraph state (VALIDATION §6)
    animation_note: "The dragged-paw ember line points straight down the charge lane before it commits."
    effects:
      - { op: deal_damage, element: fire, mult: 1.5 }        # scales on power (SKILL_EFFECTS §1)
      - { op: apply_status, status: burn, chance: 0.4, dur: 5 }
  - id: cinder_burst
    name: Cinder Burst
    targeting: { shape: aoe_circle, radius: 3, origin: self }
    cooldown: 10.0
    telegraph_s: 1.4             # slow, readable ground-flare
    animation_note: "Sits back on its haunches and shakes its whole mane once before the burst."
    effects:
      - { op: deal_damage, element: fire, mult: 1.2 }
      - { op: knockback, distance: 2 }
animation_states: [idle, walk, jump, fall, attack, telegraph, hit, die, spawn]   # elite adds telegraph + spawn
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Paces a tight circle, smoldering mane flaring with each slow breath."
  walk: "A heavy wolfish lope, head low, loose cinders trailing off the mane."
  jump: "Bunches onto its haunches and springs long and flat, ears pinned."
  fall: "Drops with legs braced wide, mane streaming upward."
  attack: "A snapping lunge-bite that rakes one body length forward."
  hit: "Flinches sideways with a snarl, shaking sparks from its mane."
  die: "Buckles at the shoulders and collapses; the mane gutters out to smoke."
  telegraph: "Rears back and drags a forepaw, scoring an ember line along the ground."
  spawn: "Bounds in and lands stiff-legged, mane igniting as it snarls."
drop_table: drop_mob_011
respawn_override: 120            # elite speed-bump respawn (overrides SPAWN §3 tier default)
flavor: "A scarred pack-leader whose mane smolders when its blood is up, herding the field's lesser cinders by snarl and scent. It rakes a line of embers across the ground before it commits to the charge."
