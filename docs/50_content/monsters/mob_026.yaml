id: mob_026
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING, SKILL_SYSTEM, SKILL_EFFECTS]
name: Drownveil Wraith
tier: elite                      # ID slot 026 = R2 elite (ID_REGISTRY Monsters)
element: shadow                  # flourished undervault shade (WORLD_PLAN R2 neutral/shadow)
weak_to: [arcane]                # anti-shadow: arcane pierces the veil (ELEMENTS §2)
resists: [shadow]
level: 15
size_class: large
stats:                           # §13 normal Lv 15 x §13.2 elite multipliers
  life: 7776                     # 1296 x6  (4*(15+3)^2 = 1296; table Lv15 = 1295)
  power: 76                      # 51 x1.5
  spellpower: 76                 # parity (§13); shadow casts scale on magic
  armor: 117                     # 90 x1.3  (armor+warding sum ~= 12*15 x1.3)
  warding: 117                   # 90 x1.3
  precision: 66                  # 60 x1.1
  evasion: 5.45                  # 3.45 + 2% (§13.2 elite)
  exp: 675                       # exp_per_kill_normal(15)=135 x5 (LEVELING §3 elite)
ai_profile: ambush_lurker
ai_params:                       # override only ambush_lurker-declared tunables (AI_BEHAVIOR §7)
  ambush_radius: 3
  leash_radius: 4
  aggro_vertical_band: 2
abilities:
  - id: shadow_lash
    name: Shadow Lash
    targeting: { shape: line, length: 6, width: 2 }
    cooldown: 7.0
    telegraph_s: 1.1
    animation_note: "Draws its shroud taut across the doorway before it whips out in a single fast lash of shadow."
    effects:
      - { op: deal_damage, element: shadow, mult: 1.5 }
      - { op: apply_status, status: silence, chance: 0.5, dur: 3 }
  - id: grave_shroud
    name: Grave Shroud
    targeting: self
    cooldown: 18.0
    telegraph_s: 1.3
    animation_note: "Wraps its tattered shroud tightly around itself, gathering a visible shell of dark before it settles."
    effects:
      - { op: grant_shield, scaling: max_life, mult: 0.10 }
      - { op: apply_status, status: fortify, chance: 1.0, dur: 8 }
animation_states: [idle, walk, jump, fall, attack, cast, telegraph, hit, die, spawn]   # elite: +telegraph +spawn (VALIDATION §6, SPAWN §6)
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Hangs suspended in the flooded doorway, its shroud rippling without a current to move it."
  walk: "Drifts low and silent along the water's surface, trailing tattered shadow."
  jump: "Surges upward in a sudden, boneless lurch through the dark."
  fall: "Sinks back down, its shroud pooling around it as it settles."
  attack: "Lashes forward out of the water in a fast whipping strike."
  cast: "Draws its shroud tight and gathers a coil of shadow before releasing it."
  telegraph: "Goes rigid in the doorway, shroud drawing taut as the dark thickens around it."
  hit: "Recoils in a rippling flinch, shroud scattering like disturbed water."
  die: "Unravels into loose threads of shadow that sink and fade."
  spawn: "Rises dripping out of the flooded water, shroud unfurling around it."
drop_table: drop_mob_026
flavor: "The last shape a drowned smuggler took, pressed thin against the cellar dark and dressed in a rag of shadow. It waits in a flooded doorway until you pass, then lashes out of the unlit water and pulls the veil back over itself."
