name: Hoarfrost Matron
tier: elite
element: frost
weak_to: [fire]
resists: [frost]
level: 56
size_class: large
stats:                           # §13 normal Lv 56 x §13.2 elite multipliers
  life: 83544                    # 13924 x6
  power: 261                     # 174 x1.5
  spellpower: 261                # parity with power (§13); abilities scale on magic
  armor: 437                     # 336 x1.3  (armor+warding sum ~= 12*56 x1.3)
  warding: 437                   # 336 x1.3
  precision: 246                 # 224 x1.1
  evasion: 6.7                   # 4.7 + 2% (§13.2 elite)
  exp: 3745                    # exp_per_kill_normal(56)=749 x5 (LEVELING §3 elite)
