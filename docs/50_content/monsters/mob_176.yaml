ai_params:
  support_radius: 7
  cast_cooldown_s: 6
  retreat_range: 6
abilities:
  - id: frost_ward
    name: Frost Ward
    targeting: party
    cooldown: 11.0
    telegraph_s: 1.3
    animation_note: "Raises both arms wide toward her brood as sheets of hoarfrost visibly rise to shield them."
    effects:
      - { op: apply_status, status: fortify, chance: 1.0, dur: 10 }
      - { op: grant_shield, scaling: max_life, mult: 0.10 }
  - id: chilling_rebuke
    name: Chilling Rebuke
    targeting: { shape: aoe_circle, radius: 3, origin: self }
