  life: 3364                     # 4*(26+3)^2
  power: 84                     # 6+3*26 (touch = round(0.5*power), neutral, §13.1)
  armor: 156                     # 6*26  (armor+warding sum = 12*26)
  warding: 156                   # 6*26
