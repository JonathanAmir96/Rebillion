id: mob_040
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING]
name: Bramblewing Harrier
tier: normal                     # ID slot 040 = R3 normal (ID_REGISTRY Monsters)
element: neutral                 # R3 element split is nature/neutral (WORLD_PLAN)
level: 14
size_class: small
stats:                           # COMBAT_FORMULA §13 normal budget, Lv 14
  life: 1156                     # 4*(14+3)^2
  power: 48                      # 6+3*14 (dive contact scales on power, §13.1)
  armor: 84                      # 6*14  (armor+warding sum = 168 = 12*14)
  warding: 84                    # 6*14
  precision: 56                  # 4*14
  evasion: 3.4                   # 3 + 0.03*14 (%)
  exp: 124                       # exp_per_kill_normal(14)=round(4*14^1.3) (LEVELING §3)
ai_profile: aerial_swooper       # a canopy raptor that stoops from the high branches (AI_BEHAVIOR §9)
ai_params:                       # override only aerial_swooper-declared tunables
  patrol_altitude: 5
  swoop_speed_mult: 2.2
  climb_recover_s: 3
animation_states: [idle, walk, jump, fall, attack, hit, die]   # airborne; jump/fall carry the stoop/climb
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Perches on an unseen updraft, wings held stiff and barely flexing."
  walk: "Cuts a steady patrolling circle high above, wingbeats broad and even."
  jump: "Tucks its wings and tips into a sharp, near-vertical stoop."
  fall: "Drops talons-first through the last stretch of its dive."
  attack: "Rakes through with both talons extended in a single raking pass."
  hit: "Breaks stride mid-air, wings flaring wide to catch itself."
  die: "Its wings crumple and it spirals down without any lift left."
drop_table: drop_mob_040
flavor: "A gray-barred hunting bird that nests in the bramble-choked crowns and owns the air above the trail. It falls out of the canopy in a talon-first stoop, rakes once, and beats back up before you can bring a weapon round."
