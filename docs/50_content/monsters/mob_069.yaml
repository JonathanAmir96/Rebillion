stats:                           # COMBAT_FORMULA §13 normal budget, Lv 20
  life: 2116                     # 4*(20+3)^2
  power: 66                      # 6+3*20 (touch = round(0.5*power), neutral, §13.1)
  armor: 120                      # 6*20  (armor+warding sum = 240 = 12*20)
  warding: 120                    # 6*20
