  idle: "Grazes with its humped back swaying, nosing slowly through the fen-moss."
  walk: "Shuffles along at a placid, unhurried browse, its fungal crown bobbing."
  jump: "A stiff, startled hop over the nearest obstacle in its flight path."
  fall: "Drops in a loose scramble, legs paddling for purchase before it lands."
  attack: "A single desperate headbutt thrown out only when its retreat is cut off."
