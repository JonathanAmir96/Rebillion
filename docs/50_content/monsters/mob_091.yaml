stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 27
  life: 3600                     # 4*(27+3)^2
  power: 87                     # 6+3*27 (touch = round(0.5*power), neutral, §13.1)
  armor: 162                     # 6*27  (armor+warding sum = 12*27)
  warding: 162                   # 6*27
  precision: 108                 # 4*27
