animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands tall with its ring of glyphs rotating slowly overhead."
  walk: "Glides backward in smooth measured retreats, ring turning as it watches."
  jump: "Lifts briefly on a short glyph-thrust to clear an obstacle."
  fall: "Settles down in a controlled drift, ring steadying beneath it."
  attack: "Snaps a glyph free from its ring and hurls it forward like a blade."
  cast: "Draws its whole ring inward, glyphs flaring bright before release."
  telegraph: "Ring of glyphs locks into a tight formation, light building at its center."
  hit: "Ring scatters wide for an instant before snapping back into formation."
  die: "Ring stops turning, glyphs dim one by one, and it folds to the floor."
  spawn: "Descends through the vault ceiling, ring of glyphs igniting as it settles."
drop_table: drop_mob_146
flavor: "A tall warden-frame crowned with a rotating ring of live glyphs, built to hold the inner vaults against exactly your kind. It keeps its distance and lets the old wards do the work."
