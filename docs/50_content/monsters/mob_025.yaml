id: mob_025
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING, SKILL_SYSTEM, SKILL_EFFECTS]
name: Gorehide Ratlord
tier: elite                      # ID slot 025 = R2 elite (ID_REGISTRY Monsters)
element: neutral                 # flourished Cellar Rat/Plague Rat pack leader (WORLD_PLAN R2)
level: 14
size_class: large
stats:                           # §13 normal Lv 14 x §13.2 elite multipliers
  life: 6936                     # 1156 x6
  power: 72                      # 48 x1.5
  armor: 109                     # 84 x1.3  (armor+warding sum ~= 12*14 x1.3)
  warding: 109                   # 84 x1.3
  precision: 62                  # 56 x1.1
  evasion: 5.42                  # 3.42 + 2% (§13.2 elite)
  exp: 620                       # exp_per_kill_normal(14)=124 x5 (LEVELING §3 elite)
ai_profile: pack_hunter
ai_params:                       # override only pack_hunter-declared tunables (AI_BEHAVIOR §10)
  aggro_radius: 6
  pack_call_radius: 11
  pack_max_size: 5
abilities:
  - id: gnash_frenzy
    name: Gnash Frenzy
    targeting: melee_arc
    cooldown: 6.0
    telegraph_s: 0.9
    animation_note: "Bares its full ridge of fangs and shudders before snapping forward in a wide gnashing bite."
    effects:
      - { op: deal_damage, element: neutral, mult: 1.4 }
      - { op: apply_status, status: sunder, chance: 0.5, dur: 6 }
  - id: vermin_call
    name: Vermin Call
    targeting: self
    cooldown: 16.0
    telegraph_s: 1.2
    animation_note: "Throws its head back in a long screeching call that draws its pack in from every side."
    effects:
      - { op: apply_status, status: empower, chance: 1.0, dur: 8 }
      - { op: summon_entity, entity_ref: mob_013, count: 3, dur: 20 }
animation_states: [idle, walk, jump, fall, attack, telegraph, hit, die, spawn]   # elite: +telegraph +spawn (VALIDATION §6, SPAWN §6)
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands hunched and bristling at the center of its pack, fur-ridge raised."
  walk: "Swaggers forward in a heavy rolling gait, pack rats parting around it."
  jump: "Shoulders through obstacles in a short, forceful bound."
  fall: "Lands stiff-legged with a thud, its ridge of fur snapping upright."
  attack: "Lunges with a wide gnashing bite, its whole scarred head driving forward."
  telegraph: "Plants its forepaws and bares its fangs in a long, snarling wind-up."
  hit: "Rocks back with a snarl, ridge fur bristling higher."
  die: "Topples heavily onto its side, ridge fur settling flat."
  spawn: "Shoulders up out of the cellar dark, pack rats scattering into place around it."
drop_table: drop_mob_025
flavor: "A rat swollen past all reason on cellar spoil, scarred snout to tail and crowned with a matted ridge of fur. It fights behind a wall of its own kin, and when they thin it simply calls up more."
