  jump: "Bulges upward briefly along its stalk without lifting free of the floor."
  fall: "Settles back down into its rooted crouch."
  attack: "Flexes its cap wide and coughs out a bursting cloud of spore."
  hit: "Shudders along its stalk, the cap contracting from the blow."
