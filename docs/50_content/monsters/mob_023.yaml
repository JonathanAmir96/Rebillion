  life: 1024                     # 4*(13+3)^2
  power: 45                     # 6+3*13 (touch = round(0.5*power), §13.1)
  armor: 78                     # 6*13  (armor+warding sum = 156 = 12*13)
  warding: 78                     # 6*13
