id: mob_002
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING]
name: Meadow Leveret
tier: normal                     # ID slot 002 = R1 normal (ID_REGISTRY Monsters)
element: neutral                 # neutral critter (WORLD_PLAN R1 mix)
level: 1
size_class: small
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 1
  life: 65                       # 4*(1+3)^2
  power: 9                       # 6+3*1 (touch dmg = round(0.5*power), neutral, §13.1)
  armor: 6                       # 6*1  (armor+warding sum = 12 = 12*1)
  warding: 6                     # 6*1
  precision: 4                   # 4*1
  evasion: 3.0                   # 3 + 0.03*1 (%)
  exp: 4                         # exp_per_kill_normal(1)=round(4*1^1.3) (LEVELING §3)
ai_profile: timid_grazer         # notices the player and runs; teaches the chase (AI_BEHAVIOR §4)
ai_params:                       # override only timid_grazer-declared tunables
  flee_radius: 5
  flee_speed_mult: 1.5
  corner_wait_s: 2
animation_states: [idle, walk, jump, fall, attack, hit, die]   # normal set
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Sits tall with ears swiveling, dropping to nibble between glances."
  walk: "Quick low hops that stretch into a flat-out bolt, ears pinned."
  jump: "A long springing arc, hind legs kicked out behind."
  fall: "Legs splayed wide, ears streaming upward."
  attack: "Wheels and lashes out a panicked double-kick with both hind feet."
  hit: "Tumbles ears-over-tail and scrambles upright."
  die: "Folds mid-stride and skids to a stop, one ear still raised."
drop_table: drop_mob_002
flavor: "A long-eared hare the color of dry hay, forever bolting for the nearest hedge. Cornering one is a novice's first lesson in cutting off an escape."
