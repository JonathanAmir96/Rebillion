animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands amid its crew, many arms gesturing small idle adjustments."
  walk: "Scuttles along the backline on quick multi-limbed steps, checking its charges."
  jump: "Hops a short obstacle on a burst from its many legs."
  fall: "Drops and catches itself evenly across all its limbs."
  attack: "Jabs one free arm forward in a sharp, reluctant strike."
  cast: "Raises several arms at once, directing a working light toward its crew."
  telegraph: "Pauses mid-stride and raises all its arms in unison, gathering charge."
  hit: "Arms flail for balance before it settles back into its stance."
  die: "Arms go slack one by one until the whole frame slumps down."
  spawn: "Unfolds a full set of arms as it rises into the work floor."
drop_table: drop_mob_148
flavor: "The shift-foreman that never clocked out, a many-armed engine still barking work-orders at machines that outlived their city. It would rather rebuild its crew than raise a hand to you."
