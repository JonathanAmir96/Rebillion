animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands immovable, ice plating shifting faintly with each slow breath."
  walk: "Advances in a slow, grinding tread, plating scraping with every step."
  jump: "A short, heavy hop that lands with a jarring thud."
  fall: "Comes down flat-footed, plating settling with an audible crunch."
  attack: "Swings its full plated bulk through in one grinding arc."
  hit: "Barely rocks, plating absorbing most of the shock."
  die: "Plating cracks outward as it sinks straight down where it stood."
  telegraph: "Plants both feet and draws itself up, plating beginning to thicken."
  spawn: "Rises up out of the rampart it holds, ice plating locking into place."
drop_table: drop_mob_172
flavor: "A warden grown into a walking rampart of blue ice, sworn to a pass it has held past all memory. It sheathes itself in rime and dares you to spend the day chipping through."
