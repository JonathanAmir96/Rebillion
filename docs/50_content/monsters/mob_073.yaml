animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Hangs low on splayed legs, its swollen gland pulsing with each slow breath."
  walk: "Backpedals in a careful sidelong scuttle, keeping its distance steady."
  jump: "A short hop to clear ground while never breaking its retreating rhythm."
  fall: "Drops with legs already braced to resume its wary backward creep."
  attack: "Rears its abdomen up and hurls a gobbet of clinging silk in a low arc."
  hit: "Recoils in a startled scuttle, gland twitching."
