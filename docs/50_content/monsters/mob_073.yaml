stats:                           # COMBAT_FORMULA §13 normal budget, Lv 22
  life: 2500                     # 4*(22+3)^2
  power: 72                      # 6+3*22 (touch = round(0.5*power), neutral, §13.1)
  armor: 132                      # 6*22  (armor+warding sum = 264 = 12*22)
  warding: 132                    # 6*22
  precision: 88                  # 4*22
