animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands planted like a shut door, seams of its plating ticking faintly."
  walk: "Takes slow, deliberate steps in a tight loop before the threshold."
  jump: "Rises briefly onto its edge in a stiff, door-like tilt."
  fall: "Comes back down flat and square with a heavy, final-sounding thud."
  attack: "Swings its whole slab body through a wide, door-like slam."
  telegraph: "Squares itself fully toward the threshold and locks its stance."
  hit: "Barely shifts, plating groaning as the impact rolls off it."
  die: "Tips slowly off its hinge-line and settles flat across the doorway."
  spawn: "Unfolds upright from a flat slab into its full standing height."
drop_table: drop_mob_147
flavor: "A door made to walk, twice the height of the gate it once was, still barring a hall that leads nowhere. It plants itself in the threshold and dares the ruin to move it."
