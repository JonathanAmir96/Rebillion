animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands wide-legged and still, head low, tusks angled forward."
  walk: "Plods forward with a rolling, heavy-shouldered gait."
  jump: "A short stiff-legged hop that barely breaks its stride."
  fall: "Lands stiff-legged with a jolt, head staying low throughout."
  attack: "Lowers its head and drives forward in a straight-line gore."
  hit: "Snorts and rocks back a half-step, tusks jerking up."
