tier: normal                     # ID slot 033 = R3 normal (ID_REGISTRY Monsters)
element: neutral                 # R3 element split is nature/neutral (WORLD_PLAN)
level: 10
size_class: medium
stats:                           # COMBAT_FORMULA §13 normal budget, Lv 10
  life: 675                      # §13 table Lv 10
  power: 36                      # 6+3*10 (touch = round(0.5*power), neutral, §13.1)
  armor: 60                      # 6*10  (armor+warding sum = 120 = 12*10)
  warding: 60                    # 6*10
  precision: 40                  # 4*10
