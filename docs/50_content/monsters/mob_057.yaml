level: 18
size_class: medium
stats:                           # all copied from COMBAT_FORMULA §13 normal budget, Lv 18
  life: 1764                     # 4*(18+3)^2
  power: 60                      # 6+3*18 (touch = round(0.5*power), neutral, §13.1)
  armor: 108                     # 6*18  (armor+warding sum = 216 = 12*18)
  warding: 108                   # 6*18
  precision: 72                  # 4*18
