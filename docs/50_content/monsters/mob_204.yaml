  life: 124416                  # 20736 (§13 Lv69) * 6
  power: 320                    # 213 * 1.5
  armor: 538                   # 414 * 1.3  (armor+warding sum = 1076)
  warding: 538                 # 414 * 1.3
  precision: 304               # 276 * 1.1
  evasion: 7.07                # 5.07 + 2 (§13.2 elite)
  exp: 4915                    # exp_per_kill_normal(69)=983 * 5 (LEVELING §3 elite)
ai_profile: ambush_lurker
ai_params:                       # override only profile-declared tunables (AI_BEHAVIOR)
  ambush_radius: 3
  leash_radius: 4
  aggro_vertical_band: 2
abilities:                       # SKILL_EFFECTS op registry (§17); scales on power/spellpower (§1)
  - id: umbral_rend
    name: Umbral Rend
    targeting: melee_arc
    cooldown: 5.0
    telegraph_s: 0.9              # plays 'telegraph' state (VALIDATION §6)
