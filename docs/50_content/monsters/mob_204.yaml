animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Sits hunched and near-invisible, a maw of dark barely stirring against the void."
  walk: "Slides forward in a slow, viscous crawl once revealed."
  jump: "Hauls itself across a gap in one heavy, lurching pull."
  fall: "Drops in a loose collapsing mass, reforming on landing."
  attack: "Rends forward in a wide, tearing swipe of its maw."
  hit: "Recoils and draws its bulk inward."
  die: "Collapses into a spreading stain that thins and vanishes."
  telegraph: "Splits open into a wide, waiting maw a beat before it strikes."
  spawn: "Rises up out of the void as a gathering knot of dark."
drop_table: drop_mob_204
flavor: "A maw of congealed void that shrouds itself in stealth and waits, rending anything that stumbles onto it into silence. Only arcane light pierces its shroud."
