id: mob_036
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING]
name: Deadwood Lurker
tier: normal                     # ID slot 036 = R3 normal (ID_REGISTRY Monsters)
element: neutral                 # R3 element split is nature/neutral (WORLD_PLAN)
level: 12
size_class: medium
stats:                           # COMBAT_FORMULA §13 normal budget, Lv 12
  life: 900                      # 4*(12+3)^2
  power: 42                      # 6+3*12 (touch = round(0.5*power), neutral, §13.1)
  armor: 72                      # 6*12  (armor+warding sum = 144 = 12*12)
  warding: 72                    # 6*12
  precision: 48                  # 4*12
  evasion: 3.4                   # 3 + 0.03*12 (%)
  exp: 101                       # exp_per_kill_normal(12)=round(4*12^1.3) (LEVELING §3)
ai_profile: ambush_lurker        # waits as fallen timber; the first strike is the telegraph (AI_BEHAVIOR §7)
ai_params:                       # override only ambush_lurker-declared tunables
  ambush_radius: 2
  leash_radius: 3
  aggro_vertical_band: 1
animation_states: [idle, walk, attack, hit, die]   # concealed idle then reveal; normal set
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Lies flat and inert, indistinguishable from a fallen plank."
  walk: "Drags itself forward in a slow, uneven timbered shuffle once revealed."
  attack: "Snaps upright and folds shut around whatever stepped onto it."
  hit: "Splinters with a jolt, sagging back toward the ground."
  die: "Collapses flat again, this time for good, settling like dead timber."
drop_table: drop_mob_036
flavor: "A slab of grey deadwood lying exactly where a bridge-plank ought to be, until you set a foot on it and it folds up around the leg. Once it has missed its ambush it fights like anything else, slow and mean, but that first snap is the whole of its cunning."
