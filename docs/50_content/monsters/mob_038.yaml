animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Stands high on stilted legs, throat working a stone into place."
  walk: "Backpedals in quick, stiff-legged steps, keeping its distance even."
  jump: "Kicks up into a short retreating hop on its stilted legs."
  fall: "Lands high-stepped and steady, throat already loading the next stone."
  attack: "Rears back and whips an overhand throw from its sling-hand."
  hit: "Staggers on its stilts, throat spasming and losing its stone."
