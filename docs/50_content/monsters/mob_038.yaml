stats:                           # COMBAT_FORMULA §13 normal budget, Lv 13
  life: 1024                     # 4*(13+3)^2
  power: 45                      # 6+3*13 (thrown-stone scales on power, §13.1)
  armor: 78                      # 6*13  (armor+warding sum = 156 = 12*13)
  warding: 78                    # 6*13
