name: Rime Jelly
tier: normal                     # ID slot 052 = R4 normal (ID_REGISTRY Monsters)
element: frost
weak_to: [fire]
resists: [frost]
level: 16
size_class: medium
stats:                           # all copied from COMBAT_FORMULA §13 normal budget, Lv 16
  life: 1444                     # 4*(16+3)^2
  power: 54                      # 6+3*16 (touch = round(0.5*power), neutral, §13.1)
  armor: 96                      # 6*16  (armor+warding sum = 192 = 12*16)
  warding: 96                    # 6*16
  precision: 64                  # 4*16
  evasion: 3.48                  # 3 + 0.03*16 (%)
  exp: 147                       # exp_per_kill_normal(16)=round(4*16^1.3) (LEVELING §3)
ai_profile: ambush_lurker        # drifts translucent in the shallows, punishing whoever wades onto it (AI_BEHAVIOR §7)
ai_params:                       # override only ambush_lurker-declared tunables
  ambush_radius: 2
  leash_radius: 3
  aggro_vertical_band: 1
animation_states: [idle, walk, jump, fall, attack, hit, die]   # normal set; no telegraph/spawn (elite/boss only)
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Drifts almost still in place, trailing veils swaying faintly with the current."
  walk: "Pulses forward in a slow, boneless drift, veils streaming behind."
  jump: "A brief upward pulse-bob, veils lifting with it."
  fall: "Sinks in a loose, weightless drift, veils trailing upward."
  attack: "Snaps its trailing veils forward in a sudden numbing lash."
  hit: "Contracts into a tighter, quivering knot before loosening again."
  die: "Goes limp and unravels, veils sinking and dissolving into the current."
drop_table: drop_mob_052
flavor: "A near-invisible drift of frozen brine, its trailing veils numbing as glass-frost where they touch. You never see the first sting coming; the chill that follows makes sure you feel the rest."
