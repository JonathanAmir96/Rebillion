id: mob_003
schema: 20_schemas/monster.schema.md
references: [COMBAT_FORMULA, STATUS_EFFECTS, AI_BEHAVIOR, DROPS, ELEMENTS, LEVELING]
name: Cinder Mite
tier: normal                     # ID slot 003 = R1 normal (ID_REGISTRY Monsters)
element: fire                    # 1 of R1's 3 fire normals (WORLD_PLAN R1 mix)
weak_to: [frost]                 # a thing of live embers (ELEMENTS §2; mutually exclusive lists)
resists: [fire]
level: 2
size_class: tiny
stats:                           # copied from COMBAT_FORMULA §13 normal budget, Lv 2
  life: 100                      # 4*(2+3)^2
  power: 12                      # 6+3*2 (touch dmg = round(0.5*power); fire body per element, §13.1)
  armor: 12                      # 6*2  (armor+warding sum = 24 = 12*2)
  warding: 12                    # 6*2
  precision: 8                   # 4*2
  evasion: 3.1                   # 3 + 0.03*2 (%)
  exp: 10                        # exp_per_kill_normal(2)=round(4*2^1.3) (LEVELING §3)
ai_profile: pack_hunter          # weak alone, dangerous in numbers; teaches groups (AI_BEHAVIOR §10)
ai_params:                       # override only pack_hunter-declared tunables
  aggro_radius: 5
  pack_call_radius: 7
  pack_max_size: 4
animation_states: [idle, walk, jump, fall, attack, hit, die]   # normal set
animation_notes:               # per-state visual brief (monster.schema rule 11)
  idle: "Squats on splayed legs, abdomen pulsing with a slow inner glow."
  walk: "A skittering zigzag scuttle, legs blurring."
  jump: "Pings off the ground like a spark struck from flint."
  fall: "Tucks every leg in and drops as a glowing dot."
  attack: "Latches on in a quick full-body bite, abdomen flaring bright."
  hit: "Bounces away onto its back, legs cycling in the air."
  die: "Bursts in a small puff of ash, legs scattering pin-straight."
drop_table: drop_mob_003
flavor: "A skittering coal-red tick that glows brighter when its swarm-kin are near. One is nothing; a boil of them chases the warmth of the living."
