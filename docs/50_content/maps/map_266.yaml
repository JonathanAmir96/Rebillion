platform_brief: |
  A floating scholar-hold's outer courtyard, one flat band of fused stone dressed in painted
  rune-glyph terrain_chunks (ART_BIBLE AB-001) -- a stable plaza, no verticality gimmick. The
  field gate sits west, the hall door center, the Rune Vaults' gate east.
flavor: "A drifting archive of a hold, still cataloguing the very sky it fell out of a century ago."
