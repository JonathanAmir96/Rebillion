name: "Duskwatch Landing"
region: voidshore
map_type: town
level_band: { min: 66, max: 66 }
biome: voidshore
tileset: tileset_voidshore
size_tiles: { w: 140, h: 24 }
bgm: bgm_town_voidshore
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [30, 18] }
  - { id: longship_dock, tile: [118, 18] }
portals:
  - id: to_umbral_shore
    kind: edge
    at: { edge: right }
    target_map: map_288
    target_spawn: main
  - id: door_to_inn
    kind: door
    at: { tile: [22, 18] }
    target_map: map_286
    target_spawn: main
  - id: pier_voidwake_tidewatch
    kind: longship
    at: { tile: [120, 18] }
    target_map: map_287
    target_spawn: longship_deck
    route_id: route_voidshore_tidewatch
    fare_ref: fare_longship_long
    cadence_s: 120.0
    sail_duration_s: 180.0
  - id: pier_voidwake_spirehaven
    kind: longship
    at: { tile: [124, 18] }
    target_map: map_287
