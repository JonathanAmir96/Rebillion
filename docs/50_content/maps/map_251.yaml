platform_brief: |
  Runework laid into the shard-plates themselves lights this span pale blue underfoot. Two
  terraces stepped by a 3-tile rise, still within the standing-jump cap (MAP_TRAVERSAL §1.1).
  No verticality gimmick beyond the rise -- the light is decoration, not mechanic.
flavor: "Whatever hand carved these glyphs into the stone meant them to be read from above -- they still glow for no one."
