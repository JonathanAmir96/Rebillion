platform_brief: |
  Damp root terraces sink 2-3 tiles between stretches, still within the standard jump
  budget (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted gloomwood
  terrain_chunks (ART_BIBLE AB-001). First faint webbing shows overhead, unclimbable set dressing.
flavor: "The path narrows to a single hushed line here, and something keeps pace just out of sight."
