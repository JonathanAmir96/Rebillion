    params:
      text: "Three trails knot together here -- fernbrake below, the tanglevine draw east, and the elderbark way climbing north."
      interact_prompt: Read
npcs: []
platform_brief: |
  A tall three-way hollow crossing: a shaded understory floor with two stacked canopy terraces
  reached by hanging vine-ropes, the northern elderbark door sitting highest (MAP_TRAVERSAL §1.1,
  gaps within the 5-tile/3.5-tile caps). Foothold segments under vine/moss terrain_chunks
  (ART_BIBLE AB-001). Width is the MAPS_SYSTEM §2 wide-junction sub-case; the climb is the gimmick.
flavor: "The hollow's trails all tangle together under the elderbark, and the light falls in green ladders you can very nearly climb."
