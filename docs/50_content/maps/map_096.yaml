platform_brief: |
  A resonant side-hollow off the Echoing Grotto, one raised shelf reachable by a
  single running jump (5-tile figure, MAP_TRAVERSAL §1). Breaks the region's level
  curve on purpose -- a tougher pocket for those who go looking.
flavor: "Half-heard song drifts from this hollow at low tide, and the pair of shapes that answer it are not friendly."
