platform_brief: |
  A wide, wind-scoured span of moored shard-plate, the widest field yet at 190 tiles. Three
  low terraces stepped by ~2-tile rises, each an easy standing jump (MAP_TRAVERSAL §1.1). No
  verticality gimmick -- the length itself is the challenge, not the footing.
flavor: "The shards run wide and flat here, long enough that the far edge is lost in prismatic haze."
