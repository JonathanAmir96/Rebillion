id: map_195
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN, RAID]
name: Mainspring Trial, the Sundered Cogworks
region: clockwork
map_type: dungeon
level_band: { min: 36, max: 40 }
biome: clockwork
tileset: tileset_clockwork
size_tiles: { w: 60, h: 40 }
bgm: bgm_clockwork
ambience: [amb_gears]
layers_preset: standard
spawn_points:
  - { id: main, tile: [10, 30] }
portals:
  - id: to_flywheel_vault
    kind: door
    at: { tile: [54, 12] }
    target_map: map_196
    target_spawn: main
    dead_end: true  # stage chain is sequential and one-way forward (RAID.md §4); this exit unlocks once the stage's kill gate clears
spawn_zones:
  - id: sundered_cogworks_zone
    rect_tiles: { x: 16, y: 22, w: 32, h: 10 }
    mobs:
      - { mob: mob_143, count: 3 }
      - { mob: mob_144, count: 3 }
    max_concurrent: 8
npcs: []
platform_brief: |
  Mainspring Trial stage 1 of 3 -- the PUZZLE (RAID.md §4 reach/quest_object), which
  teaches the signature: "the beat", a fixed clockwork cycle identical on every run.
  Pressure plates must be reached in the order the escapement strikes them; the stage
  is learned, never out-statted. Cycle period is Phase D. Party-instanced per SPAWN §7.
flavor: "The outer cogworks, sundered long before any muster reached the Custodian's own gate."
