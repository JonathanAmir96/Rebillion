id: map_102
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: The Hush Path, Mossbound Bend
region: gloomwood
map_type: field
level_band: { min: 22, max: 22 }
biome: gloomwood
tileset: tileset_gloomwood
size_tiles: { w: 160, h: 30 }
bgm: bgm_gloomwood
ambience: [amb_canopy_drip, amb_web_creak]
layers_preset: standard
spawn_points:
  - { id: main, tile: [16, 22] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
    target_map: map_101
    target_spawn: main
    dead_end: false
  - id: to_next
    kind: edge
    at: { edge: right }
    target_map: map_103
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: hush_path_mossbound
    rect_tiles: { x: 26, y: 20, w: 64, h: 8 }
    mobs:
      - { mob: mob_071, count: 3 }
      - { mob: mob_072, count: 3 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_trapper_camp_coss
    at_tile: [40, 21]
    params:
      text: "A crude stake-post marks a trap-line -- someone still works this bend of the wood."
      interact_prompt: Read
npcs: [npc_056]
platform_brief: |
  A wide mossy bend around a fallen giant trunk, crossable footholds within the standard
  jump budget (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted gloomwood
  terrain_chunks (ART_BIBLE AB-001). A trapper's stake-line runs along the low ground.
flavor: "Moss swallows every sound at this bend, thick enough to muffle even a trapper's footsteps."
