id: map_052
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Verdant Hollow, Mosswatch Ridge
region: verdant
map_type: field
level_band: { min: 11, max: 12 }
biome: verdant_hollow
tileset: tileset_verdant_hollow
size_tiles: { w: 150, h: 32 }
bgm: bgm_verdant_hollow
ambience: [amb_leaves, amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [14, 24] }
portals:
  - id: to_weeping_willows
    kind: edge
    at: { edge: left }
    target_map: map_051
    target_spawn: main
    dead_end: false
  - id: to_tanglevine_draw
    kind: edge
    at: { edge: right }
    target_map: map_053
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: mosswatch_ridge_slope
    rect_tiles: { x: 30, y: 18, w: 66, h: 12 }
    mobs:
      - { mob: mob_034, count: 3 }        # shares mob_034 with weeping willows
      - { mob: mob_035, count: 2 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_mosswatch_ridge
    at_tile: [22, 23]
    params:
      text: "The ridge climbs here, moss-slick stone underfoot. Watch your step -- and watch the treeline."
      interact_prompt: Read
npcs: []
platform_brief: |
  A rising ridge in three ~2-tile terraces, each gap within the 5-tile/3.5-tile jump caps
  (MAP_TRAVERSAL §1.1). Foothold segments dressed in mossy stone terrain_chunks (ART_BIBLE
  AB-001); a one-way ledge partway up shortcuts a return descent. No rope/ladder needed.
flavor: "Old watch-cairns line this ridge, moss-swallowed now, though no one remembers what they once watched for."
