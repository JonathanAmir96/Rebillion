  - id: to_heartwood_vault
    kind: door
    at: { tile: [4, 20] }
    target_map: map_066
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: whispering_hollow_pocket
    rect_tiles: { x: 16, y: 16, w: 26, h: 8 }
    mobs:
      - { mob: mob_046, count: 1 }        # elevated elite weight, secret-map bonus content (SPAWN §2)
