npcs: []
platform_brief: |
  A small hushed side-pocket carved into the heartwood, one flat floor, no verticality
  gimmick. Foothold segments dressed in heartwood terrain_chunks (ART_BIBLE AB-001); a
  dead end off Heartwood Vault, small and atmosphere-dense rather than a through-route.
flavor: "Sound behaves strangely in this knot -- footsteps echo back a beat too late, like something is repeating them."
