platform_brief: |
  A vertical drowned-nave room-and-corridor loop, denser combat pacing than the fields (SPAWN §2
  dungeon budget). Ledges stack in 2-3 tile rises, doubled by water-physics headroom
  (MAP_TRAVERSAL §7); no rope/ladder required on the main line.
flavor: "The gate opens on a long, flooded nave where the tide itself seems to breathe in and out with the current."
