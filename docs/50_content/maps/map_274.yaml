platform_brief: |
  A narrow ledge circling the vault's last intact chamber below. One climb within the
  3.5-tile rise cap (MAP_TRAVERSAL §1.1) reaches the elevated flourish zone. Dense corridor
  combat holding through to the vault's deepest room (SPAWN §2).
flavor: "Past this ledge the vault stops pretending to be a library and starts looking like a cage."
