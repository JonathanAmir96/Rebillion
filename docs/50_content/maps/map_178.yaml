platform_brief: |
  Terraces of rust-flaked brass plating, stepped by ~2-tile rises within the standard jump
  budget (MAP_TRAVERSAL §1.1). A one-way ledge shortcuts down toward the lower spawn
  cluster; no rope/ladder on this opener.
flavor: "Rust weeps from every seam here, though the gears beneath the plating never stop turning."
