id: map_030
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Millbrook Farmland, Scarecrow Flats
region: millbrook
map_type: field
level_band: { min: 9, max: 10 }
biome: old_town
tileset: tileset_old_town
size_tiles: { w: 150, h: 28 }
bgm: bgm_old_town
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [18, 22] }
portals:
  - id: to_furrow_row
    kind: edge
    at: { edge: left }
    target_map: map_029
    target_spawn: main
    dead_end: false
  - id: to_lower_race
    kind: edge
    at: { edge: right }
    target_map: map_031
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: scarecrow_flats_zone
    rect_tiles: { x: 40, y: 16, w: 70, h: 10 }
