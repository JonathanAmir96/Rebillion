id: map_094
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: The Sunken Threshold
region: tidewatch
map_type: dungeon
level_band: { min: 22, max: 22 }
biome: tidewatch
tileset: tileset_tidewatch
size_tiles: { w: 55, h: 50 }
water_physics: true
bgm: bgm_tidewatch
layers_preset: standard
spawn_points:
  - { id: main, tile: [10, 40] }
  - { id: from_sunken, tile: [45, 40] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
    target_map: map_093
    target_spawn: main
    dead_end: false
  - id: to_sunken
    kind: edge
    at: { edge: bottom }
    target_map: map_152
    target_spawn: from_tidewatch  # cross-region descent, WORLD_PLAN edge table -- forward-ref, Sunken batch
    dead_end: false
spawn_zones:
  - id: dungeon_main_094
    rect_tiles: { x: 8, y: 30, w: 39, h: 16 }
    mobs:
      - { mob: mob_066, count: 1 }
      - { mob: mob_063, count: 2 }
