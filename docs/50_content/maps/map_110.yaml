platform_brief: |
  Low ground fog sits permanently at ankle height, purely visual (no water_physics -- this
  is not Sunken Depths). Terraces keep every gap within the standard jump budget
  (MAP_TRAVERSAL §1.1); terrain is foothold segments under painted terrain_chunks (ART_BIBLE AB-001).
flavor: "The fog never lifts down here, thick enough that footsteps behind you could belong to anyone."
