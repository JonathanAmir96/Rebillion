platform_brief: |
  Half-submerged in void mist, a field of glyph-carved plates that read as legible only from
  the upper tier. A single light-vine rope (MAP_TRAVERSAL §4) connects the lower reading floor
  to the upper terrace. Standard climb rules apply throughout.
flavor: "The glyphs here mean something, clearly, but only from above -- from the floor they're just cracks in old stone."
