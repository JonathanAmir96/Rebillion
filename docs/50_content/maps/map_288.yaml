id: map_288
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: "Umbral Shore, the Landing Flats"
region: voidshore
map_type: field
level_band: { min: 66, max: 66 }
biome: voidshore
tileset: tileset_voidshore
size_tiles: { w: 150, h: 26 }
bgm: bgm_voidshore
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [16, 20] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
    target_map: map_285
    target_spawn: main
  - id: to_next
    kind: edge
    at: { edge: right }
    target_map: map_289
    target_spawn: main
spawn_zones:
  - id: shore_zone_288
    rect_tiles: { x: 30, y: 16, w: 100, h: 10 }
    mobs:
      - { mob: mob_207, count: 4 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_trailhead_288
    at_tile: [20, 19]
    params:
      text: "The shore darkens fast past the Landing's lamps. Mind your footing on the black glass."
      interact_prompt: Read
npcs: []
platform_brief: |
  Low basalt terraces stepped by ~2-tile rises, each crossable in a single running
  jump (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted void-surf
  terrain_chunks (ART_BIBLE AB-001). The shore keeps climbing gently toward the
  Redoubt with no verticality gimmick beyond the terraces.
flavor: "The black surf climbs a little higher on this stretch of the Umbral Shore, and the things that hunt in it climb with it."
