id: map_163
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Ruin's Edge, Drowned Gatefront
region: sunken
map_type: field
level_band: { min: 35, max: 36 }
biome: tidewatch_dark
tileset: tileset_tidewatch_dark
size_tiles: { w: 150, h: 30 }
water_physics: true
bgm: bgm_tidewatch_dark
ambience: [amb_drip]
layers_preset: standard
spawn_points:
  - { id: main, tile: [16, 22] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
    target_map: map_162
    target_spawn: main
    dead_end: false
  - id: to_ruin_halls
    kind: edge
    at: { edge: right }
    target_map: map_164
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: sunken_field_163
    rect_tiles: { x: 45, y: 18, w: 60, h: 8 }
    mobs:
      - { mob: mob_119, count: 4 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_gatefront
    at_tile: [132, 21]
    params:
      text: "The drowned gate stands open. Beyond it, the ruin halls keep their own dark."
      interact_prompt: "Read"
npcs: [npc_072]
platform_brief: |
  A short approach terrace ending at the ruin gate proper. A scholar keeps a careful vigil on
  the gate shelf. The final gap into the ruin halls sits inside the doubled water-physics cap.
flavor: "The drowned gate looms at last, its threshold worn into a deep groove by a kingdom that no longer walks it."
