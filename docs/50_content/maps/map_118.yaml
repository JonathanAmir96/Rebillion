id: map_118
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: The Silkbound Vault, Outer Skein
region: gloomwood
map_type: dungeon
level_band: { min: 27, max: 28 }
biome: gloomwood
tileset: tileset_gloomwood
size_tiles: { w: 70, h: 50 }
bgm: bgm_gloomwood
ambience: [amb_web_creak, amb_insect_hum]
layers_preset: standard
spawn_points:
  - { id: main, tile: [14, 42] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
    target_map: map_117
    target_spawn: main
    dead_end: false
  - id: to_next
    kind: edge
    at: { edge: right }
    target_map: map_119
    target_spawn: main
    dead_end: false
  - id: to_shedskin_hollow
    kind: door
    at: { tile: [50, 30] }
    target_map: map_123
    target_spawn: main
    dead_end: false
interactables:
  - type: sign
    id: sign_vault_threshold
    at_tile: [16, 40]
    params:
      text: "The warrens end and the true web-vaults begin -- the walls themselves are woven now."
      interact_prompt: Read
spawn_zones:
  - id: silkbound_vault_outer_skein
    rect_tiles: { x: 20, y: 32, w: 32, h: 12 }
    mobs:
      - { mob: mob_083, count: 2 }
      - { mob: mob_084, count: 2 }
    max_concurrent: 8
npcs: []
platform_brief: |
  The tunnel walls turn from wood to woven silk here, ledges still within the standard
  jump budget (MAP_TRAVERSAL §1.1). A shed door in the silk opens onto a hidden hollow
  (secret). Denser dungeon combat pacing (SPAWN §2).
flavor: "Wood gives way to silk entirely past this point -- the wood itself seems to have grown a skin."
