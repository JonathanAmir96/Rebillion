platform_brief: |
  Denser corridor loops than the open fields above (SPAWN §2 dungeon budget), the gear-pit
  floor stepped in ~2-tile rises. No rope/ladder on the main line; gaps stay within the
  standard jump budget (MAP_TRAVERSAL §1.1).
flavor: "The stair from the west gate bottoms out in a vault of idle flywheels, each taller than a house."
