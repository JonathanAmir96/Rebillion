id: map_033
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Old Millworks Yard
region: millbrook
map_type: field
level_band: { min: 11, max: 12 }
biome: old_town
tileset: tileset_old_town
size_tiles: { w: 150, h: 28 }
bgm: bgm_old_town
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [18, 22] }
portals:
  - id: to_grinding_wheel
    kind: edge
    at: { edge: left }
    target_map: map_032
    target_spawn: main
    dead_end: false
  - id: to_sunken_row
    kind: edge
    at: { edge: right }
    target_map: map_034
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: millworks_yard_zone
    rect_tiles: { x: 40, y: 16, w: 70, h: 10 }
    mobs:
      - { mob: mob_019, count: 2 }
      - { mob: mob_020, count: 3 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_millworks_yard
    at_tile: [24, 21]
    params:
      text: "The old millworks stand roofless and quiet, crates stacked deep enough to hide plenty."
      interact_prompt: Read
platform_brief: |
  A cluttered yard of stacked crates and broken cart wheels, single band, a couple
  of 2-tile crate-stacks to hop within the standard jump budget (MAP_TRAVERSAL
  §1.1). Terrain is foothold segments under painted terrain_chunks (ART_BIBLE AB-001).
flavor: "Crates piled three deep in the old millworks yard, most of them empty, some of them very much not."
