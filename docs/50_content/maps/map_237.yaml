platform_brief: |
  Denser ice-vault corridors than the Glacier Caverns proper, the elite pair now the norm
  rather than the exception (SPAWN §2). No rope/ladder on the main line; ledges stay within
  the standard jump budget (MAP_TRAVERSAL §1.1).
flavor: "The Rimevaults, where the isle's oldest ice keeps its oldest secrets -- and where the Deepfrost muster gathers."
