platform_brief: |
  One long quayside band, flat end to end -- a working harbor town, no verticality
  gimmick. Terrain is foothold segments dressed with painted terrain_chunks (ART_BIBLE
  AB-001). Interior doors line the landward side; the coach station sits mid-quay, the
  longship pier past the breakwater at the eastern end.
flavor: "Salt-scoured and gull-loud, Tidewatch Port ties the harborwatch's coastal beat to the wider Harthmoor ring and the longship lanes beyond it."
