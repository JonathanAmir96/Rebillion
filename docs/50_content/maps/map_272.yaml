platform_brief: |
  Toppled rune-stacks form a broken vertical maze, climbs staying within the 3.5-tile rise
  cap (MAP_TRAVERSAL §1.1). Dense corridor-loop combat (SPAWN §2); no gimmick beyond the
  cramped, fractured layout.
flavor: "Whatever cracked these stacks apart did it from the inside -- every fracture radiates outward, not in."
