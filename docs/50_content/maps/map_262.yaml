platform_brief: |
  A high, wind-scoured shelf where the void mist thins enough to see the drop clearly for
  once. Two terraces stepped by a 3-tile rise, within the standing-jump cap (MAP_TRAVERSAL
  §1.1). No verticality gimmick beyond the exposure itself.
flavor: "The mist thins up here, just enough to remind you exactly how far the fall would be."
