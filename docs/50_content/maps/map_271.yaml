platform_brief: |
  A wide landing where the old vault-wardens once stood watch, now empty. Two chamber tiers
  connected by a short climb within the standing-jump cap (MAP_TRAVERSAL §1.1); an elevated
  perch hosts the floor's elite flourish. Dense corridor-loop combat (SPAWN §2).
flavor: "The warden-plinths here still stand empty, waiting on guardians that stopped answering the call generations back."
