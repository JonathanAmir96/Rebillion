platform_brief: |
  A cracked span of the old sky-road, wide and level under painted terrain_chunks
  (ART_BIBLE AB-001). Two low terraces stepped by ~2-tile rises, every gap well within the
  standing-jump cap (MAP_TRAVERSAL §1.1). No verticality gimmick.
flavor: "Whatever once connected this span to the rest of the sky-roads has long since fallen -- it just ends, mid-air, past the far edge."
