platform_brief: |
  A coiled root-cellar chamber, ledges stacked in 2-3 tile rises within the standard jump
  budget (MAP_TRAVERSAL §1.1). A half-hidden side door low on the east wall opens onto a
  sealed larder chamber (secret). Denser dungeon combat pacing (SPAWN §2).
flavor: "Roots coil floor to ceiling here like ribs, and something has clearly been storing food behind them."
