id: map_031
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Mill Lane, the Lower Race
region: millbrook
map_type: field
level_band: { min: 10, max: 10 }
biome: old_town
tileset: tileset_old_town
size_tiles: { w: 150, h: 28 }
bgm: bgm_old_town
ambience: [amb_wind, amb_drip]
layers_preset: standard
spawn_points:
  - { id: main, tile: [18, 22] }
portals:
  - id: to_scarecrow_flats
    kind: edge
    at: { edge: left }
    target_map: map_030
    target_spawn: main
    dead_end: false
  - id: to_grinding_wheel
    kind: edge
    at: { edge: right }
    target_map: map_032
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: lower_race_zone
    rect_tiles: { x: 40, y: 16, w: 70, h: 10 }
    mobs:
      - { mob: mob_017, count: 3 }
      - { mob: mob_018, count: 2 }
    max_concurrent: 6
platform_brief: |
  A sluggish millrace runs alongside the path, a single low foothold band with a
  2-tile step at the sluice gate, well within the standard jump budget (MAP_TRAVERSAL
  §1.1). Terrain is foothold segments under painted terrain_chunks (ART_BIBLE AB-001).
flavor: "The lower race feeds the millwheel two fields on, its slow black water thick with things that shouldn't be that big."
