platform_brief: |
  The tallest field on the chain, three sheer tiers rising well past the 3.5-tile jump cap
  (MAP_TRAVERSAL §1.1) between the lower and upper reaches. A single drifting rune-shard
  platform (MAP_TRAVERSAL §5) bridges the climb; no fall damage regardless (§2).
flavor: "The drift climbs steeply here, tier over tier, until Spirehaven's pier is only a smudge of stone far below."
