name: Shardline Reach, High Drift
region: arcane_reach
map_type: field
level_band: { min: 63, max: 64 }
biome: arcane_reach
tileset: tileset_arcane_reach
size_tiles: { w: 180, h: 34 }
bgm: bgm_arcane_reach
ambience: [amb_wind, amb_void_hum]
