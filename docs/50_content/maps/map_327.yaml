id: map_327
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, RAID, DROPS]
name: The Deepfrost Hoard
region: frostpeak
map_type: secret
level_band: { min: 55, max: 55 }
biome: frostpeak
tileset: tileset_frostpeak
size_tiles: { w: 44, h: 22 }
bgm: bgm_frostpeak
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [6, 16] }
portals:
  - id: to_deepfrost_staging
    kind: door
    at: { tile: [40, 16] }
    target_map: map_238
    target_spawn: main
    dead_end: true       # one-way out to the herald's staging map (RAID.md §6.E: the party is returned there on bonus-clock expiry or on leaving). The INBOUND edge is authored on the finale arena's side, opened only by a raid-entry kill.
interactables:
  - type: reactor
    id: reactor_rime_cist_a
    at_tile: [10, 16]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
  - type: reactor
    id: reactor_rime_cist_b
    at_tile: [16, 16]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
  - type: reactor
    id: reactor_rime_cist_c
    at_tile: [22, 16]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
  - type: reactor
    id: reactor_frozen_pack_a
    at_tile: [28, 16]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
  - type: reactor
    id: reactor_frozen_pack_b
    at_tile: [34, 16]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
  - type: reactor
    id: reactor_wyrm_cache
    at_tile: [22, 10]
    params:
      drop_table_ref: drop_raid_bonus_deepfrost
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Break open
npcs: []
platform_brief: |
  The Deepfrost's bonus room (RAID.md §6.E): Skoldir's hoard under the crevasse floor,
  opened by the portal that appears in map_244 on a raid-entry kill. One screen, flat,
  no traversal gimmick -- the 90 s bonus clock is the only pressure and no monsters
  spawn here. Every node is one-shot (respawn_timer_s past the clock).
flavor: "Everything the Rimewyrm ever dragged down here, still where the ice took it."
