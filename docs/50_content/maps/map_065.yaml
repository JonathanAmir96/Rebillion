id: map_065
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Root Warrens, Deep Roots
region: verdant
map_type: dungeon
level_band: { min: 14, max: 15 }
biome: verdant_hollow
tileset: tileset_verdant_hollow
size_tiles: { w: 64, h: 70 }
bgm: bgm_verdant_hollow
ambience: [amb_drip]
layers_preset: standard
spawn_points:
  - { id: main, tile: [32, 8] }
portals:
  - id: to_grub_hollows
    kind: edge
    at: { edge: top }
    target_map: map_064
    target_spawn: main
    dead_end: false
  - id: to_heartwood_vault
    kind: edge
    at: { edge: bottom }
    target_map: map_066
    target_spawn: main
    dead_end: false
moving_platforms:
  - id: root_lift_deep_roots
    path: [[32, 20], [32, 52]]
    speed: 3.0
    pause_s: 1.5
    loop_mode: ping_pong
    one_way: false
spawn_zones:
  - id: deep_roots_hall
    rect_tiles: { x: 16, y: 20, w: 36, h: 30 }
    mobs:
      - { mob: mob_039, count: 3 }
      - { mob: mob_040, count: 2 }
    max_concurrent: 8
interactables:
  - type: sign
    id: sign_deep_roots
    at_tile: [22, 18]
    params:
      text: "The shaft drops straight here. A slow root-lift carries what the warren's tenants can't carry themselves."
      interact_prompt: Read
npcs: []
platform_brief: |
  A deep vertical shaft bridged by a slow root-lift (moving_platform, 3 tiles/s,
  MAP_TRAVERSAL §5) alongside a stepped fallback route within the 5-tile/3.5-tile jump
  caps (§1.1). Foothold segments dressed in deep-root terrain_chunks (ART_BIBLE AB-001).
flavor: "The shaft drops further than torchlight reaches, and something down there keeps the root-lift's ropes oddly clean."
