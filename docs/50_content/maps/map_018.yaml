interactables:
  - type: coach_station
    id: coach_station_018
    at_tile: [140, 20]
    params: {}
  - type: lore_marker
    id: marker_undervault_seal
    at_tile: [130, 19]
    params:
      text: "A rust-sealed gate sinks below the square here -- the old undervault quarter, where the Flicker line trains and older things than rats are said to sleep."
      interact_prompt: Read
npcs: [npc_016, npc_017, npc_018, npc_031]
platform_brief: |
  A broad market square of timber and worn cobble, one long band with the sealed
  undervault gate set into the square's north wall. Terrain is foothold segments
  under painted terrain_chunks (ART_BIBLE AB-001); no verticality gimmick, a hub town.
flavor: "Millbrook Central hums lantern-lit day and night, cart wheels and market cries echoing off a square built over older stone than anyone admits."
