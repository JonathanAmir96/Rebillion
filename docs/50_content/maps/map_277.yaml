platform_brief: |
  Broken clockwork gears the size of shard-plates lie half-buried in the floor here, none
  turning. Chamber-to-chamber climbs stay within the 3.5-tile rise cap (MAP_TRAVERSAL §1.1).
  Dense corridor combat (SPAWN §2).
flavor: "These gears once turned in step with the sky itself. Now they lie still, rusted through with void-damp."
