platform_brief: |
  A long hall of failing wardlight, most of the old glyphwork gone dark. One long chamber
  with a raised gallery reachable by a single climb within the standing-jump cap
  (MAP_TRAVERSAL §1.1). Dense corridor combat plus a common elite zone (SPAWN §2).
flavor: "Only a handful of the old glyphs still burn here -- the rest gutter, faint and cold, like something worked loose their hold."
