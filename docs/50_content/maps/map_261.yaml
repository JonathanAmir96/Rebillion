platform_brief: |
  A narrow causeway between two larger shard masses, dead flat and unremarkable underfoot.
  One continuous foothold band under painted terrain_chunks (ART_BIBLE AB-001), no
  verticality gimmick -- the field is a deliberate breather before the last climb.
flavor: "The last flat ground before the drift climbs for good -- most travelers linger here longer than the map deserves."
