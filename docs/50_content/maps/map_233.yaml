name: Glacier Caverns, Wyrm's Throat
region: frostpeak
map_type: dungeon
level_band: { min: 56, max: 57 }
biome: frostpeak
tileset: tileset_frostpeak
size_tiles: { w: 70, h: 50 }
bgm: bgm_frostpeak
ambience: [amb_wind, amb_drip]
layers_preset: standard
spawn_points:
  - { id: main, tile: [14, 40] }
