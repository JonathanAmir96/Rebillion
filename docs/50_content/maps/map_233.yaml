platform_brief: |
  A vertical ice-cavern room-and-corridor loop, denser combat pacing than the fields
  (SPAWN §2 dungeon budget). Ledges stack in 2-3 tile rises, each within the standard jump
  budget (MAP_TRAVERSAL §1.1); no rope/ladder required on the main line.
flavor: "Deeper into the glacier's dead ice, where the cold itself seems to be listening."
