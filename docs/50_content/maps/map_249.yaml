platform_brief: |
  A narrow causeway of fused glass-shard plates, still one continuous foothold band under
  painted terrain_chunks (ART_BIBLE AB-001). A single 2-tile rise breaks the run, well inside
  the standing-jump cap (MAP_TRAVERSAL §1.1). No verticality gimmick yet -- the drift proper
  starts past the next span.
flavor: "The old sky-road here fused into glass long before anyone charted it, and it rings faintly underfoot with every step."
