platform_brief: |
  This shard has come loose of its old mooring and lists visibly, the far half of the field
  rising a full terrace above the near half. Two drifting rune-shard platforms
  (MAP_TRAVERSAL §5) carry players up across the tilt where no standing jump reaches.
flavor: "This shard slipped its mooring a generation back and never settled -- the whole field still leans, faintly, toward the mist."
