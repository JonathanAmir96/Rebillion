platform_brief: |
  An open floor strung floor-to-ceiling with active weaving lines, ledges within the
  standard jump budget (MAP_TRAVERSAL §1.1). Heaviest elite density of the dungeon chain
  (SPAWN §2), just short of the loom gate.
flavor: "The weaving here never stops -- new strands cross the old ones even as you watch."
