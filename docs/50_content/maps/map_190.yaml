platform_brief: |
  A tall hall of counter-rotating flywheels; a raised gantry above the main floor hides
  the reliquary door. No rope/ladder needed — the gantry stair stays within the standard
  jump budget (MAP_TRAVERSAL §1.1).
flavor: "Twin flywheels still spin against each other here, close enough to shear a careless hand clean off."
