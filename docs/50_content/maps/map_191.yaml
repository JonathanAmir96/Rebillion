id: map_191
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: The Gearworks, The Proving Floor
region: clockwork
map_type: dungeon
level_band: { min: 39, max: 41 }
biome: clockwork
tileset: tileset_clockwork
size_tiles: { w: 72, h: 46 }
bgm: bgm_clockwork
ambience: [amb_gears]
layers_preset: standard
spawn_points:
  - { id: main, tile: [14, 36] }
portals:
  - id: to_flywheel_hall
    kind: edge
    at: { edge: left }
    target_map: map_190
    target_spawn: main
    dead_end: false
  - id: to_escapement_deep
    kind: edge
    at: { edge: right }
    target_map: map_192
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: proving_floor_zone
    rect_tiles: { x: 20, y: 26, w: 32, h: 12 }
