      - { mob: mob_143, count: 2 }
      - { mob: mob_144, count: 2 }
    max_concurrent: 8
interactables:
  - type: lore_marker
    id: marker_proving_floor
    at_tile: [36, 24]
    params:
      text: "A ring of brass sigils, worn smooth by four job lines' worth of Lv 40 trials. This is the proving_floor waypoint the Clockwork trial hook (10_systems/JOBS.md) points to."
      interact_prompt: Read
npcs: [npc_081]
platform_brief: |
  A sunken circular floor ringed by brass sigil-plates, wide open and flat -- the
  region's shared 2nd-advancement trial site (10_systems/JOBS.md's Clockwork trial hook,
  pattern only there; concrete quest wiring is each line's home-town batch). Overseer
  Brannick keeps watch from the gantry rim. No verticality gimmick on the floor itself.
flavor: "Every job line's second oath is sworn on this floor, brass sigils underfoot worn smooth by four centuries of trials."
