platform_brief: |
  A collapsed gear-pit sunk one band below the main terrace, crossed by a single rope
  rather than a jump (MAP_INTERACTABLES §3 climbable). The pit floor holds the densest
  spawn cluster; the upper rim stays clear for a breather.
flavor: "Enormous cogs lie half-buried where the yard floor gave way, still grinding against nothing."
