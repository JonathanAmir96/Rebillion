  - id: to_tolling_row
    kind: edge
    at: { edge: right }
    target_map: map_182
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: ashcog_flats_zone
    rect_tiles: { x: 30, y: 18, w: 64, h: 8 }
