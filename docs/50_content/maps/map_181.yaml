platform_brief: |
  A wide, flat expanse of ash-caked plating, easiest crossing in the chain. No verticality
  gimmick; a single continuous foothold end to end (ART_BIBLE AB-001, MAP_TRAVERSAL v2.4).
flavor: "Ash sifts down from some unseen furnace above, settling grey over brass that never cools."
