platform_brief: |
  A shallow bowl of fractured crystal scatters ambient light into every color at once. Two
  low terraces stepped by a 2-tile rise, an easy standing jump throughout (MAP_TRAVERSAL
  §1.1). No mechanical gimmick -- the hollow's disorientation is purely visual.
flavor: "Every crystal fragment here throws the same handful of colors, over and over, until the eye stops trusting distance."
