platform_brief: |
  The shards visibly cluster tighter here, drawn toward Highrune Sanctum's mass ahead. Two
  terraces stepped by ~2-tile rises, all within the standing-jump cap (MAP_TRAVERSAL §1.1).
  No verticality gimmick beyond the rises.
flavor: "The nearer shards crowd together the closer you get to the Sanctum, as if drawn by whatever still anchors it."
