platform_brief: |
  A shallow root-crossed clearing, the last patch where any daylight reaches the floor.
  Gaps remain within the standard jump budget (MAP_TRAVERSAL §1.1); terrain is foothold
  segments under painted gloomwood terrain_chunks (ART_BIBLE AB-001).
flavor: "Call this the last honest light in Gloomwood -- past here the canopy never breaks again."
