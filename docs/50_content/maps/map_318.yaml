platform_brief: |
  A narrowing gallery of drowned stone, its drops all within
  MAP_TRAVERSAL §1.1's crossable range. Terrain is foothold segments under
  painted terrain_chunks (ART_BIBLE AB-001), the density thinning near the
  sealed door into the Voidtide stage chain.
flavor: "The reach narrows to a single sealed door here, and the air past it tastes of the open void."
