platform_brief: |
  Flat torch-lit rampart on a single band, the final holdfast before the deep dungeons.
  Terrain is foothold segments under painted terrain_chunks (ART_BIBLE AB-001); no
  verticality gimmick, a plain safe hub between the shore and the Sunder Deeps.
flavor: "The final holdfast before the void, its torches burning against a sky that never fully closes over. Past its wall, only the deep dark waits."
