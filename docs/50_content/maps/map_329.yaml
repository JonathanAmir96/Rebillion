npcs: []
platform_brief: |
  The Shattered Orrery's bonus room (RAID.md §6.E): the reliquary shard the anchor-ring kept
  moored, opened by the portal that appears in map_284 on a raid-entry kill. One screen, flat,
  no traversal gimmick -- the orbit signature (RAID.md §4) does not reach here and no
  moving_platforms are authored, so the 90 s bonus clock is the only pressure and no monsters
  spawn. Every node is one-shot (respawn_timer_s past the clock).
flavor: "The one shard Aetheron never let drift, hung in still prismatic haze with a century of offerings still on it."
