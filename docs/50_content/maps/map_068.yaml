platform_brief: |
  A small sunken side-pocket, one flat floor with no verticality gimmick. Foothold
  segments dressed in root/coin-scatter terrain_chunks (ART_BIBLE AB-001); a dead end
  off Sunken Chamber, small and reward-dense rather than a through-route.
flavor: "Half-sunk chests and older bones share this pocket -- whoever left this hoard never made it back for it."
