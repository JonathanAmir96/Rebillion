platform_brief: |
  Web-draped terraces narrow the walkable band but every gap stays within the standard
  jump budget (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted gloomwood
  terrain_chunks (ART_BIBLE AB-001); the webbing itself is unclimbable dressing.
flavor: "The strands overhead thicken into ropes here, though nothing has yet shown itself to spin them."
