platform_brief: |
  Loose skeins of old web drape between the trunks, purely visual set-dressing over
  ordinary foothold terrain (MAP_TRAVERSAL §1.1, ART_BIBLE AB-001). Gaps stay within the
  standard running-jump budget throughout.
flavor: "Web hangs so thick here it catches falling leaves before they reach the ground."
