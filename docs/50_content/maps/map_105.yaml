  - id: to_next
    kind: edge
    at: { edge: right }
    target_map: map_106
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: cobweb_outer_skein
    rect_tiles: { x: 26, y: 20, w: 64, h: 8 }
