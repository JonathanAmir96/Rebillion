references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Cobweb Hollow, Outer Skein
region: gloomwood
map_type: field
level_band: { min: 23, max: 24 }
biome: gloomwood
tileset: tileset_gloomwood
size_tiles: { w: 160, h: 30 }
