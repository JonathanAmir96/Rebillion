npcs: []
platform_brief: |
  The Undervault Heist's bonus room (RAID.md §6.E): the Cellar King's own hoard,
  reached only by the portal that opens in map_042 on a raid-entry kill. One screen,
  flat, deliberately trivial to traverse -- the 90 s bonus clock is the only pressure
  and no monsters spawn here. Every node is one-shot (respawn_timer_s past the clock).
flavor: "What the Cellar King actually hoarded, stacked in the dark behind his throne -- and ninety seconds to carry it out."
