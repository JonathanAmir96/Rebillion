id: map_140
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Ashfall East Dunes
region: ashfall
map_type: field
level_band: { min: 32, max: 32 }
biome: ashfall
tileset: tileset_ashfall
size_tiles: { w: 150, h: 26 }
bgm: bgm_ashfall
ambience: [amb_wind, amb_embers]
layers_preset: standard
spawn_points:
  - { id: main, tile: [16, 20] }
  - { id: from_tidewatch, tile: [140, 20] }  # ring-closure arrival from Tidewatch's north strand
portals:
  - id: to_139
    kind: edge
    at: { edge: left }
    target_map: map_139
    target_spawn: main
  - id: to_141
    kind: edge
    at: { edge: right }
    target_map: map_141
    target_spawn: main
    # ring closure to Tidewatch's north strand (WORLD_PLAN edge table); forward-ref, R4 sibling batch
  - id: to_tidewatch
    kind: edge
    at: { edge: right }
    target_map: map_088
    target_spawn: from_ashfall
  - id: to_dune_crossroads                 # additive branch to the wide crossroads (map_333)
    kind: door
    at: { tile: [110, 19] }
    target_map: map_333
    target_spawn: from_east_dunes
spawn_zones:
  - id: map_140_zone
    rect_tiles: { x: 30, y: 16, w: 60, h: 8 }
    mobs:
      - { mob: mob_100, count: 3 }
      - { mob: mob_101, count: 2 }
    max_concurrent: 6
npcs: []
platform_brief: |
  A long, gently descending dune line toward the coast, gaps all within the single
  running-jump cap (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted
  ash terrain_chunks (ART_BIBLE AB-001); the ring-closure edge sits at the far east side.
flavor: "The easternmost dunes crest toward the coast, where the barrens' heat finally meets Tidewatch's salt air."
