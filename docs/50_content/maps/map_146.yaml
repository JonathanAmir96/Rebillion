platform_brief: |
  A tight vertical gauntlet of vent shafts and rock ledges, each rise within the
  3.5-tile cap and each gap within the 5-tile cap (MAP_TRAVERSAL §1.1). Terrain is
  foothold segments under painted ash terrain_chunks (ART_BIBLE AB-001); heat-haze
  is visual only, no hazard tiles authored on this pass.
flavor: "Cinder-heat presses close in these vents, and something down here has learned to breathe it."
