    id: reactor_escrow_drum_a
    at_tile: [10, 16]
    params:
      drop_table_ref: drop_raid_bonus_mainspring
      respawn_timer_s: 120        # > the 90 s bonus clock (RAID.md §6.E): every node is one-shot
      harvest_prompt: Crack open
