npcs: []
platform_brief: |
  The Mainspring Trial's bonus room (RAID.md §6.E): the Custodian's escrow, opened by
  the portal that appears in map_200 on a raid-entry kill. One screen, flat, no
  traversal gimmick -- the 90 s bonus clock is the only pressure and no monsters spawn
  here. Every node is one-shot (respawn_timer_s past the clock).
flavor: "The Custodian kept its accounts in brass drums, wound and sealed -- and never once spent them."
