id: map_303
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: "Umbral Shore, Drowned Light Hollow"
region: voidshore
map_type: field
level_band: { min: 76, max: 77 }
biome: voidshore
tileset: tileset_voidshore
size_tiles: { w: 150, h: 29 }
bgm: bgm_voidshore
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [16, 20] }
portals:
  - id: to_prev
    kind: edge
    at: { edge: left }
