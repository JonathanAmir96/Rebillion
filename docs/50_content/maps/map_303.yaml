platform_brief: |
  Low basalt terraces stepped by ~2-tile rises, each crossable in a single running
  jump (MAP_TRAVERSAL §1.1). Terrain is foothold segments under painted void-surf
  terrain_chunks (ART_BIBLE AB-001). The shore keeps climbing gently toward the
  Redoubt with no verticality gimmick beyond the terraces.
flavor: "The black surf climbs a little higher on this stretch of the Umbral Shore, and the things that hunt in it climb with it."
