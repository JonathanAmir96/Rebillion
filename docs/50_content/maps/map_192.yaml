id: map_192
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: The Gearworks, Escapement Deep
region: clockwork
map_type: dungeon
level_band: { min: 40, max: 41 }
biome: clockwork
tileset: tileset_clockwork
size_tiles: { w: 70, h: 50 }
