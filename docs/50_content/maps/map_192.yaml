spawn_points:
  - { id: main, tile: [14, 40] }
portals:
  - id: to_proving_floor
    kind: edge
    at: { edge: left }
    target_map: map_191
    target_spawn: main
    dead_end: false
  - id: to_mainspring_approach
    kind: edge
    at: { edge: right }
