platform_brief: |
  A ticking maze of escapement arms sweeping the corridor at a slow, readable cadence
  (a hazard-adjacent gimmick, authored fully on the boss's own arena, not here). No
  rope/ladder; standard jump gaps between arm sweeps (MAP_TRAVERSAL §1.1).
flavor: "The escapement's arms sweep the corridor floor in a slow, patient rhythm, still counting seconds no one is left to spend."
