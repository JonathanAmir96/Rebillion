platform_brief: |
  Storm-fused glass ridges jut across this shard in jagged rows, the walkable path threading
  between them along a plain foothold band. Two low terraces, each an easy standing jump
  (MAP_TRAVERSAL §1.1). No verticality gimmick.
flavor: "Lightning that never touches ground fuses the sand up here into ridges of black glass, over and over, season after season."
