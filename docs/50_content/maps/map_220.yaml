platform_brief: |
  A single flat band along the hold's wind-break wall, no verticality gimmick -- the second
  safe stop on the climb. Terrain is foothold segments dressed with painted stone/snow
  terrain_chunks (ART_BIBLE AB-001); the whole walkable span is one continuous foothold.
flavor: "A wind-scoured mountain hold halfway up the isle's spine, its hearths kept lit for travelers who've earned the climb this far."
