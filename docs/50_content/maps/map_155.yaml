platform_brief: |
  A flat, wide stretch broken by two shallow rises. A camp diver keeps watch from the upper
  shelf. Every gap is a comfortable single jump even at normal (non-doubled) distances.
flavor: "The silt floor pulses faintly with drifting motes of blue light every time a footstep disturbs it."
