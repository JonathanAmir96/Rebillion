platform_brief: |
  The floor drops a full band lower here, roots forming a wide shelf below the canopy
  proper; the descent stays within the doubled water_physics-free jump budget
  (MAP_TRAVERSAL §1.1). A high, disused ledge above the shelf is where the Clockwork
  drop-chute (MAP_CONNECTIONS §7) surfaces -- unreachable from ground level, one-way only.
flavor: "The wood sinks into a hollow here, roots stacked like shelving in some buried library no one built."
