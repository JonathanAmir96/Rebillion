spawn_points:
  - { id: main, tile: [16, 24] }
  - { id: from_clockwork, tile: [140, 10] }   # MAP_CONNECTIONS §7 terminus: Clockwork's Mainspring (map_144) drop-chute lands here, dead_end authored on that side
portals:
  - id: to_prev
