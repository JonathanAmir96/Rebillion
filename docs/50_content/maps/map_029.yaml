id: map_029
schema: 20_schemas/map.schema.md
references: [MAPS_SYSTEM, MAP_CONNECTIONS, MAP_INTERACTABLES, MAP_LAYERS, MAP_TRAVERSAL, WORLD_PLAN, SPAWN]
name: Millbrook Farmland, Furrow Row
region: millbrook
map_type: field
level_band: { min: 9, max: 9 }
biome: old_town
tileset: tileset_old_town
size_tiles: { w: 150, h: 28 }
bgm: bgm_old_town
ambience: [amb_wind]
layers_preset: standard
spawn_points:
  - { id: main, tile: [18, 22] }
portals:
  - id: to_millbrook_central
    kind: edge
    at: { edge: left }
    target_map: map_018
    target_spawn: main
    dead_end: false
  - id: to_scarecrow_flats
    kind: edge
    at: { edge: right }
    target_map: map_030
    target_spawn: main
    dead_end: false
spawn_zones:
  - id: furrow_row_zone
    rect_tiles: { x: 40, y: 16, w: 70, h: 10 }
    mobs:
      - { mob: mob_014, count: 3 }
      - { mob: mob_016, count: 2 }
    max_concurrent: 6
interactables:
  - type: sign
    id: sign_furrow_row
    at_tile: [24, 21]
    params:
      text: "Furrow Row's crop rows run long and straight -- watch for burrows between them."
      interact_prompt: Read
npcs: [npc_026]
platform_brief: |
  Long plowed furrows crossable in a single stride, one flat band, no verticality
  gimmick. Terrain is foothold segments under painted terrain_chunks (ART_BIBLE
  AB-001).
flavor: "Millbrook's furrowed fields stretch inland from the square, tended by farmers who've learned to live with what digs under the rows."
