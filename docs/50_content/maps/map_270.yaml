platform_brief: |
  This archive floor tilted and half-sank into the shard below it; a light-vine rope
  (MAP_TRAVERSAL §4) climbs the tilted upper stacks. Dense combat per the dungeon budget
  (SPAWN §2), corridor-loop layout.
flavor: "Half this archive slid loose of its shelving when the floor gave way -- the tablets that survived only fell up."
