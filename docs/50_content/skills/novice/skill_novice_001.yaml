references: [SKILL_SYSTEM, SKILL_EFFECTS, SKILL_ANIMATION, STATUS_EFFECTS, ELEMENTS]
name: Lunge                        # exact JOBS.md §6 novice-kit roster name (skill.schema rule 1)
line: novice
