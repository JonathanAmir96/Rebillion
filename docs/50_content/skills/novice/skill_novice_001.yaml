level_data:                        # rows only at 1/4/7/10; ranks 2/3/5/6/8/9 interpolate (SKILL_SYSTEM §4)
  - level: 1
    essence_cost: 4
    cooldown: 2.0
    effects:                       # order/element/op-list identical across rows (non-interpolatable)
