      - { op: deal_damage, element: neutral, mult: 1.0, scaling: power }   # SKILL_EFFECTS §3
  - level: 4
    essence_cost: 6
    cooldown: 1.8
    effects:
      - { op: deal_damage, element: neutral, mult: 1.2, scaling: power }
  - level: 7
    essence_cost: 7
    cooldown: 1.6
    effects:
      - { op: deal_damage, element: neutral, mult: 1.4, scaling: power }
  - level: 10
    essence_cost: 7
    cooldown: 1.5
    effects:
      - { op: deal_damage, element: neutral, mult: 1.6, scaling: power }   # mult non-decreasing, cooldown non-increasing (§4 warn)
animation: skill_novice_001_cast
flavor: "A forward stab with whatever's in hand — the first strike every adventurer learns before they learn anything else."
