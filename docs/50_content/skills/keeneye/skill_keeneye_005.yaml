  - level: 1
    effects:
      - { op: passive_stat_bonus, stats: { precision: 1 }, mode: flat }   # STATS.md token (SKILL_EFFECTS §13); first-job kit, smaller than spec-tier bands
      - { op: passive_stat_bonus, stats: { crit_rate: 0.01 }, mode: pct }
  - level: 4
    effects:
      - { op: passive_stat_bonus, stats: { precision: 2 }, mode: flat }
      - { op: passive_stat_bonus, stats: { crit_rate: 0.02 }, mode: pct }
  - level: 7
    effects:
      - { op: passive_stat_bonus, stats: { precision: 3 }, mode: flat }
      - { op: passive_stat_bonus, stats: { crit_rate: 0.03 }, mode: pct }
  - level: 10
    effects:
      - { op: passive_stat_bonus, stats: { precision: 4 }, mode: flat }
      - { op: passive_stat_bonus, stats: { crit_rate: 0.04 }, mode: pct }
flavor: "A hunter's patience folded into the draw: a Keeneye who takes the extra half-second lands truer, and crits a little more often for it."
