  - level: 10
    effects:
      - { op: on_hit_proc, trigger: on_deal, chance: 0.8, effect: { op: heal, scaling: power, mult: 0.15 } }
flavor: "Every blow the Ironbrand lands feeds a little back. The longer the fight runs, the harder they are to put down."
