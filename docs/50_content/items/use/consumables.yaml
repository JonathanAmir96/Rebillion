    price:
      buy: 15                        # ECONOMY §4.1 exact (well-known ID, hard-checked)
      sell: 4                        # ECONOMY §4.1 exact (well-known ID, hard-checked)
    effects:
      # flat restore; ~40% of Lv1-band player life (STATS §2 life(1)=120+18*1+3*might(1)=153,
      # main-might sample table). First-pass per ECONOMY §5's ~40%-of-band-life assumption.
      - { op: heal, scaling: flat, amount: 60 }
