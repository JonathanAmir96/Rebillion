id: item_table_consumables
schema: 20_schemas/item.schema.md
references: [ITEMS, ECONOMY, SKILL_EFFECTS, INVENTORY]
# The use-item table: item_use_0001-0060 (ID_REGISTRY §use; 0001-0016 well-known names, hard-
# checked exact name + price per item.schema rule 10). This batch authors the 16 well-known
# arc-1 rows (0001-0016): the five life/essence tonic tiers (Lesser/base/Greater/Superior/Prime,
# ITEMS §1.1 tier->band binding: req_level = band start 1/10/19/28/37) plus the six un-tiered
# specialties (Antidote/Thaw Salve/Millbrook Return Scroll/Hearth Bread/Sharpening Oil/Ironhide
# Draught). Prices are ECONOMY §4.1's literal buy/sell numbers (hard, not derived from the
# round(0.25*buy) formula where the table's own literal sell differs, e.g. Antidote 50/12).
# Heal/restore_essence amounts target ~40% of the band-start STATS §2 life/essence pool
# (main-primary auto-growth sample, ECONOMY §5's ~40%-of-band assumption); first-pass, tunable.
# 0021-0060 stays reserved (region specialties, raid consumables, Phase D growth).
