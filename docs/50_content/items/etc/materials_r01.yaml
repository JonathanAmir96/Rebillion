id: item_table_materials_r01
schema: 20_schemas/item.schema.md
references: [ITEMS, ECONOMY, INVENTORY, DROPS, WORLD_PLAN]
# R1 Emberfoot monster materials: item_etc_0001-0016 (ID_REGISTRY etc block). One row per R1
# species (0001-0013) plus three region-gathered materials (0014-0016). No `buy` on etc rows
# (not vendor-purchasable, ITEMS §1); `sell` is first-pass (etc price has no ECONOMY owner,
# item.schema OQ); stack 999 fixed (INVENTORY §2); rarity is display-tier only on etc (ITEMS §5).
items:
  - id: item_etc_0001
    name: Tuftmoth Down
    category: etc
    rarity: common
    req_level: 1                  # band placement (advisory for etc)
    price:
      sell: 3
    source_hint: mob_001          # Tuftmoth Grub (cross-checks drop_mob_001)
    stack: 999
    flavor: "A pinch of soft grey fluff shed by the meadow grubs. Emberfoot's outfitter stuffs it into a novice's first bedroll."

  - id: item_etc_0002
    name: Leveret Pelt
    category: etc
    rarity: common
    req_level: 1
    price:
      sell: 3
    source_hint: mob_002          # Meadow Leveret (cross-checks drop_mob_002)
    stack: 999
    flavor: "A supple hay-colored hide, still warm. The village tanner trades scraps of it for the price of a meal."

