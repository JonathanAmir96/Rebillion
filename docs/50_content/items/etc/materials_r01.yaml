    price:
      sell: 7
    source_hint: mob_008          # Pebblethrow Imp (cross-checks drop_mob_008)
    stack: 999
    flavor: "A knobbly little finger-bone, oddly heavy for its size. Gamblers on the ferry roll a pair of them for luck."

