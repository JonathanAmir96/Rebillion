    name: Ashwing Scale
    category: etc
    rarity: common
    req_level: 4
    price:
      sell: 6
    source_hint: mob_005          # Ashwing Flitter (cross-checks drop_mob_005)
    stack: 999
    flavor: "A dusty grey wing-scale that smudges the fingers like soft charcoal. Children on Emberfoot draw with it."

