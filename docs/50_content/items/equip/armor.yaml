id: item_table_armor
schema: 20_schemas/item.schema.md
references: [ITEMS, ECONOMY, ENHANCEMENT]
# This file holds both arc blocks (item.schema File conventions: one shared armor.yaml): arc-1
# item_equip_0041-0070 (this batch: 5 slots x T1-T6, ITEMS §4/§8) and arc-2 item_equip_0255-0284
# (5 slots x T7-T12, v3 re-block). Slot order matches item.schema's arc-1 convention: head, body,
# legs, boots, gloves, each x its arc's tiers, contiguous (arc-1: head 0041-0046, body 0047-0052,
# legs 0053-0058, boots 0059-0064, gloves 0065-0070; arc-2: head 0255-0260, body 0261-0266, legs
# 0267-0272, boots 0273-0278, gloves 0279-0284). Arc-1's 0071-0140 stays reserved (growth,
# ITEMS §4 OQ).
#
# Arc-1 rows: rarity uncommon (1 affix line, ITEMS §5), enhance_max 9 (ENHANCEMENT §2). base
# armor/warding = ITEMS §8 formula armor_base(slot,L)=round(w[slot]*K(L)/3), warding_base=
# round(0.70*armor_base), K(L)=50+20L (COMBAT_FORMULA §5); w[slot] body .28/legs .24/head .18/
# boots .15/gloves .15. T1/T4/T6 (Lv1/22/36) match the ITEMS §8 checksum table exactly; T2/T3/T5
# (Lv8/15/29, not tabulated there) are computed from the same formula. Price buy=round(
# base_buy(tier)*2.5)/sell=round(0.25*buy) (ECONOMY §4/§4.2; base_buy T1-T6 = 30/120/300/600/
# 1050/1800, the table's own tier column). Affix (1 line, uncommon) per the same slot convention
# as the arc-2 block: head/body -> +life (11u); legs -> +armor (4u); boots -> +haste
# (round(1+0.05L)); gloves -> +precision (3u). u(L) by tier: T1(1)=2, T2(8)=3, T3(15)=5,
# T4(22)=6, T5(29)=8, T6(36)=9 (ITEMS §10, same formula as weapons.yaml). All affix pe totals
# are well under the uncommon per-line cap at every tier (checked per row below).
#
# Arc-2 rows (landed earlier batch): rarity uncommon (1 affix line, ITEMS §5), enhance_max 9 (ENHANCEMENT §2). base
# armor/warding = ITEMS §8 formula armor_base(slot,L)=round(w[slot]*K(L)/3), warding_base=
# round(0.70*armor_base), K(L)=50+20L (COMBAT_FORMULA §5); w[slot] body .28/legs .24/head .18/
# boots .15/gloves .15. T8/T10/T12 values match the ITEMS §8 checksum table exactly; T7/T9/T11
# (Lv43/57/71, not tabulated there) are computed from the same formula. Price buy=round(
# base_buy(tier)*2.5)/sell=round(0.25*buy) (ECONOMY §4/§4.2; T11/T12 base_buy 10500/13000 per
# ECONOMY §4.2's tabulated T12 and interpolated T11).
#
# Affix (1 line, uncommon) assigned per slot by a fixed authoring convention (ITEMS §10
# eligibility: armor rolls primary/life/armor/warding/haste; gloves also crit_rate/precision):
# head/body -> +life (11u); legs -> +armor (4u); boots -> +haste (round(1+0.05L)); gloves ->
# +precision (3u). u(L) values by tier: T7(43)=11, T8(50)=12, T9(57)=14, T10(64)=16, T11(71)=17,
# T12(78)=19 (ITEMS §10, same formula/anchors as weapons.yaml). All affix pe totals are well
# under the uncommon per-line cap at every tier (checked below per row).
