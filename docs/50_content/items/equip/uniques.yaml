id: item_table_uniques
schema: 20_schemas/item.schema.md
references: [ITEMS, ECONOMY, ENHANCEMENT, DROPS, WORLD_PLAN]
# This file holds both arc blocks (item.schema File conventions: one shared uniques.yaml): arc-1
# item_equip_0201-0216 (this batch: bosses #1-#8, WORLD_PLAN's 8 region bosses) and arc-2
# item_equip_0217-0222 (bosses #9-#11: Skoldir, Aetheron, Nyxaris). Boss-unique mapping (formula
# item_equip_{0199+2n}/{0200+2n}, docs/ID_REGISTRY.md): Cindermaw(n=1) 0201-0202, Cellar King(n=2)
# 0203-0204, Thornback Sovereign(n=3) 0205-0206, Tidecaller Morva(n=4) 0207-0208, Mother Gloam(n=5)
# 0209-0210, Karnothal(n=6) 0211-0212, The Drowned Warden(n=7) 0213-0214, The Custodian(n=8)
# 0215-0216.
#
# Each boss owns one weapon unique (legendary) + one non-weapon unique (epic), per ITEMS §11's
# "a boss may own e.g. one weapon + one amulet." req_level = the boss's own level (ITEMS §11, not
# the ladder's per-tier req_level -- Lv8/14/16/22/28/34/38/40 fall between or on official T-tiers,
# same convention the arc-2 block below already established). Base lines are computed directly
# from the ITEMS §7-§9 closed-form formulas at that exact level rather than snapped to the nearest
# tier row; `tier` records the nearest official ladder tier for categorization/tooling only
# (Cindermaw T2 exact, Cellar King/Thornback T3, Morva T4 exact, Gloam T5, Karnothal/Warden/
# Custodian T6 -- same Open Question as the arc-2 block on this field's convention).
#
# Non-weapon slot is chosen so the 8 arc-1 bosses cover the 8 non-weapon equip slots once each
# (head/body/legs/boots/gloves/cape/ring/amulet) -- a Phase D authoring convention, not an
# ITEMS.md rule. Weapon type mirrors each home-ring-town job line where the boss's region is a
# job-line home (CLAUDE.md: Bulwark->Cindershelf/Ashfall, Keeneye->Tidewatch Port, Weaver->
# Mossmere/Verdant, Flicker->Millbrook), doubled up across the remaining bosses for an even
# 2-per-type split: Karnothal(Ashfall, home)+Cindermaw = blade; Morva(Tidewatch, home)+
# Custodian = bow; Thornback(Verdant, home)+Drowned Warden = staff; Cellar King(Millbrook,
# home)+Gloam = dirk.
#
# Affix eligibility per slot is ITEMS §10. Legendary (4 lines) = 3 ordinary + 1 flourish
# (on_hit_proc, SKILL_EFFECTS §16; ITEMS §11 allows 1-2 flourish lines) themed to the boss's
# WORLD_PLAN element (Cindermaw/Karnothal fire->burn, Cellar King/Gloam shadow->poison,
# Thornback nature->root, Morva/Warden frost->chill/freeze, Custodian arcane->sunder). Epic
# (3 lines) = 3 ordinary, no flourish. crit_rate/crit_power/evasion affix lines use the ITEMS
# §10 affix-menu nearest-anchor convention (only Lv1/22/36 tabulated in the arc-1 range) --
# same method the arc-2 block already established for Skoldir/Aetheron/Nyxaris. Price:
# buy = round(base_buy(tier) * 30) (ECONOMY §4.2 epic/legendary multiplier, suppressed to x30
# for both); sell = round(0.25*buy); base_buy by tier from weapons.yaml's table (T2=120, T3=300,
# T4=600, T5=1050, T6=1800 -- all directly tabulated, no extrapolation needed unlike the arc-2
# block's T9/T11/T12).
