  # T10 Skyshard (Arcane Reach, Lv53-68) -> T11 Voidshroud / T12 Tidesunder (Voidshore, Lv66-80).
  # All rows: rarity uncommon (1 affix line, ITEMS §5), enhance_max 9 (ENHANCEMENT §2), price
  # buy = round(base_buy(tier) * 2.5) / sell = round(0.25*buy) (ECONOMY §4/§4.2; base_buy T7-T10
  # per ECONOMY §4.2 table+interp: 2800/4000/6000/8000; T11/T12 not tabulated there -- extrapolated
  # by continuing the T8->T10 +2000/tier arithmetic step to 10000/12000, Phase D first-pass, flagged
  # for ECONOMY.md to adopt formally). Affix = +primary(line_hint's governing primary, ITEMS §3)
  # value u(L)=round(1.5+0.22*L) (ITEMS §10), always <= per-line cap round(1.4*u(L)) for uncommon.
  # u(L)/cap(L) by tier: T7(43)=11/15, T8(50)=12/17, T9(57)=14/20, T10(64)=16/22, T11(71)=17/24,
  # T12(78)=19/27 (T8/T10/T12 anchors match ITEMS §10 table exactly; T7/T9/T11 computed from the
  # same formula, same method the exemplar row above used for T7).

