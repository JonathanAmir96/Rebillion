# All line weapons live in this one table (ITEMS §12 grouping): arc-1 item_equip_0001-0040 AND
# arc-2 item_equip_0231-0254 (v3 re-block, ID_REGISTRY / ITEMS §4; item.schema's File-conventions
# row lists both ranges; ID_REGISTRY is authoritative). Intra-block layout (ITEMS §4): arc-2
# weapons contiguous by line, blade 0231-0236 / bow 0237-0242 / staff 0243-0248 / dirk
# 0249-0254, each T7->T12.
#
# Arc-1 block (this batch): item_equip_0001-0024, contiguous by line -- blade 0001-0006 / bow
# 0007-0012 / staff 0013-0018 / dirk 0019-0024, each T1->T6 (req_level 1/8/15/22/29/36, ITEMS §4).
# 0025-0040 stays reserved (intra-line growth). NB: ITEMS §4's own "ID-block layout" prose
# describes arc-1 with gaps instead (blade 0001-0006, bow 0011-0016, staff 0021-0026, dirk
# 0031-0036, with 0007-0010/0017-0020/... reserved between lines) -- this batch instead follows
# the task brief's explicit contiguous layout, which matches the pattern this file already uses
# for arc-2 above (lines packed together, reserved tail at the end, not interleaved). Both
# layouts mint the same 24 IDs inside the same 0001-0040 ID_REGISTRY block; flagged here for
# ITEMS.md §4 to reconcile its prose with the as-authored convention, not resolved in this file.
#
# All arc-1 rows: rarity uncommon (1 affix line, ITEMS §5), enhance_max 9 (ENHANCEMENT §2). Base
# W (ITEMS §7 closed-form, tabulated exactly at these six req_levels) and affix +primary u(L)
# (ITEMS §10) per tier: T1(1)=W8/u2, T2(8)=W26/u3, T3(15)=W49/u5, T4(22)=W78/u6, T5(29)=W112/u8,
# T6(36)=W151/u9 (staff W = round(1.10x) of the physical column: 9/29/54/86/123/166). Per-line
# uncommon cap(L)=round(1.4*u(L)) by tier: 3/4/7/8/11/13 -- every affix line here sits at exactly
# u(L), well under cap. Price buy=round(base_buy(tier)*2.5)/sell=round(0.25*buy) (ECONOMY §4/§4.2;
# base_buy T1-T6 = 30/120/300/600/1050/1800, the table's own tier column, no extrapolation needed
# unlike the arc-2 rows below).
