id: item_table_accessories
schema: 20_schemas/item.schema.md
references: [ITEMS, ECONOMY, ENHANCEMENT]
# This file holds both arc blocks (item.schema File conventions: one shared accessories.yaml):
# arc-1 item_equip_0141-0156 (this batch: 16 rows, ITEMS §4 v3 re-block) and arc-2
# item_equip_0285-0300 (16 rows). Arc-1's own range is also exactly 16 IDs (no growth tail),
# mirroring the arc-2 file's convention exactly: ring x6 (T1-T6, 0141-0146) + amulet x6 (T1-T6,
# 0147-0152) + cape x4 (0153-0156). Cape skips the same relative tiers as the arc-2 block (there:
# T9/T11 of 12; here, mirrored onto the 6-tier arc-1 ladder: T3/T5, i.e. cape is authored at
# T1/T2/T4/T6 only) -- same first-pass judgment call the arc-2 block already flagged, not
# re-litigated here. Arc-1's 0157-0180 stays reserved (growth, ITEMS §4 OQ).
#
# Arc-1 rows: base values are ITEMS §9's own table (all 6 arc-1 tiers T1-T6 are tabulated there
# directly -- no formula interpolation needed, unlike weapons.yaml/armor.yaml). Rarity uncommon
# (1 affix line, ITEMS §5); enhance_max 9 (ENHANCEMENT §2). Price buy=round(base_buy(tier)*2.5)/
# sell=round(0.25*buy) (ECONOMY §4/§4.2; base_buy T1-T6 = 30/120/300/600/1050/1800, the table's
# own tier column). Same ring->fortune / amulet->focus / cape->haste authoring convention as the
# arc-2 block below. u(L) by tier: T1(1)=2, T2(8)=3, T3(15)=5, T4(22)=6, T5(29)=8, T6(36)=9
# (ITEMS §10, same formula as weapons.yaml/armor.yaml).
#
# Arc-2 rows (landed earlier batch): the arc-2 range is exactly 16 IDs (no reserved-growth tail), so it cannot fit 3 slots x 6 tiers
# (18). Authored split: ring x6 (T7-T12, 0285-0290) + amulet x6 (T7-T12, 0291-0296) + cape x4
# (0297-0300). Cape is authored at only 4 of the 6 tiers (T7/T8/T10/T12, skipping T9/T11) --
# a Phase D first-pass choice with no owning-doc tiebreak for which 2 tiers to drop; flagged
# below (Open Questions) for the region-batch lead / ITEMS.md to confirm or replace with an
# even/uneven split rule of its own.
#
# Base values are ITEMS §9's own table (all 6 arc-2 tiers T7-T12 are tabulated there directly --
# no formula interpolation needed, unlike weapons.yaml/armor.yaml). Rarity uncommon (1 affix
# line, ITEMS §5); enhance_max 9 (ENHANCEMENT §2). Price buy=round(base_buy(tier)*2.5)/sell=
# round(0.25*buy) (ECONOMY §4/§4.2, same base_buy-by-tier-ordinal table as weapons.yaml/
# armor.yaml: 7000/10000/15000/20000/25000/30000 for T7-T12).
#
# Chosen base primary (ring/amulet roll "one primary of the wearer's choosing at author time",
# ITEMS §2/§9): this table fixes ring -> fortune, amulet -> focus (an authoring convention, not
# an ITEMS.md rule) so the pool has one deterministic row per slot per tier. Affix (1 line,
# uncommon; ITEMS §10 eligibility ring/amulet: primary/crit_rate/crit_power/power/spellpower;
# cape: evasion/warding/haste) reinforces the same base identity: ring -> +primary(fortune)
# u(L), amulet -> +primary(focus) u(L), cape -> +haste (round(1+0.05L)). u(L) values by tier:
# T7(43)=11, T8(50)=12, T9(57)=14, T10(64)=16, T11(71)=17, T12(78)=19 (ITEMS §10, same as
# weapons.yaml/armor.yaml).
