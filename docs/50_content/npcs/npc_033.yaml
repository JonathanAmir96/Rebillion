dialog:
  greeting: "The hollow answers if you ask it properly -- fire, frost, or the raw arcane between. Which will you learn first?"
  idle: "Every root here has a name, if you listen long enough."
  farewell: "Mind your essence, and mind the hollow. Both run dry if you're careless."
portrait: portrait_npc_033
flavor: "Elder Yewna has taught the weaving of raw essence into elements from this athenaeum for three decades, and outlived every apprentice who thought they knew better."
