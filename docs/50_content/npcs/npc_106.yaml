dialog:
  greeting: "The Shattered Orrery turns for no one alone -- bring me a full party and I'll time your crossing to the gears. Come short-handed and I'll send you back down the stair."
  farewell: "Watch the shards' turn, not the ground under you. Aetheron pulls the whole ring loose once he wakes."
portrait: portrait_npc_106
flavor: "Iskrel has sealed and reopened the Rune Vaults' outer door more times than he'll admit, and now calls every muster that goes past it into the Orrery."
