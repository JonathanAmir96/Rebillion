      - { item: item_equip_0141 }       # T1 ring (accessories.yaml)
      - { item: item_equip_0147 }       # T1 amulet (accessories.yaml)
      - { item: item_equip_0153 }       # T1 cape (accessories.yaml)
      - { item: item_equip_0002 }       # T2 blade (weapons.yaml)
      - { item: item_equip_0008 }       # T2 bow (weapons.yaml)
      - { item: item_equip_0014 }       # T2 staff (weapons.yaml)
      - { item: item_equip_0020 }       # T2 dirk (weapons.yaml)
      - { item: item_equip_0042 }       # T2 head (armor.yaml)
      - { item: item_equip_0048 }       # T2 body (armor.yaml)
      - { item: item_equip_0054 }       # T2 legs (armor.yaml)
      - { item: item_equip_0060 }       # T2 boots (armor.yaml)
