id: drop_pools
schema: 20_schemas/drop_table.schema.md
references: [DROPS, ITEMS, WORLD_PLAN]
# The single shared region-pools file (drop_table.schema §File conventions). The schema requires
# exactly 11 pools[] (pool_equip_r01..r11, docs/ID_REGISTRY.md's 11-region world) -- rule 9 is a
# GLOBAL/final check, like the world-graph check (VALIDATION §5): each region batch APPENDS its
# own pool entry here (it does NOT create a per-region pool file). This batch adds the arc-1
# pools pool_equip_r01-r08.
#
# Arc-1 tier-fit rule (DROPS §6: "whose tier matches that region's level band"; item.schema rule
# 9 warn): each region pool includes every gear tier T1-T6 (ITEMS §4) whose req_level falls
# inside that region's own Lv band (docs/WORLD_PLAN.md Region overview), computed directly
# rather than assigned by eye -- tiers land in more than one region where WORLD_PLAN's bands
# themselves overlap (by design, MapleStory-style zone overlap), so some tiers legitimately
# appear in two adjacent pools (T2 in R1/R2/R3, T3 in R3/R4, T4 in R4/R5) while T5/T6 land in
# exactly one region each since their req_level (29/36) falls outside the next region's own
# band. R7/R8 share the same T6 set (both bands only fit the arc-1-top tier) rather than
# leaving either region without a pool. Full per-region set: R1 T1+T2, R2 T2, R3 T2+T3, R4
# T3+T4, R5 T4, R6 T5, R7 T6, R8 T6. Composition per DROPS §6: weapons(4)+armor(5)+
# accessories(2-3, cape authored only at T1/T2/T4/T6 per accessories.yaml) per included tier.
