id: drop_pools
schema: 20_schemas/drop_table.schema.md
references: [DROPS, ITEMS, WORLD_PLAN]
# The single shared region-pools file (drop_table.schema §File conventions). The schema requires
# exactly 12 pools[] (pool_equip_r01..r11 + reserved) -- rule 9 is a GLOBAL/final check, like the
# world-graph check (VALIDATION §5): this exemplar seeds the R9 pool; each region batch APPENDS its
# own pool entry here (it does NOT create a per-region pool file).
pools:
  - id: pool_equip_r09                 # NN=09 matches region order R9 (DROPS §6)
    region: frostpeak
    entries:                            # base equips whose tier sits in R9's band (T7-T8, Lv 40-55; DROPS §6, ITEMS §4)
      - { item: item_equip_0231 }       # T7 blade (weapons.yaml)
      - { item: item_equip_0237 }       # T7 bow (weapons.yaml)
      - { item: item_equip_0243 }       # T7 staff (weapons.yaml)
      - { item: item_equip_0249 }       # T7 dirk (weapons.yaml)
      - { item: item_equip_0232 }       # T8 blade (weapons.yaml)
      - { item: item_equip_0238 }       # T8 bow (weapons.yaml)
      - { item: item_equip_0244 }       # T8 staff (weapons.yaml)
      - { item: item_equip_0250 }       # T8 dirk (weapons.yaml)
      - { item: item_equip_0255 }       # T7 head (armor.yaml)
      - { item: item_equip_0256 }       # T8 head (armor.yaml)
      - { item: item_equip_0261 }       # T7 body (armor.yaml)
      - { item: item_equip_0262 }       # T8 body (armor.yaml)
      - { item: item_equip_0267 }       # T7 legs (armor.yaml)
