      - { item: item_equip_0297 }       # T7 cape (accessories.yaml)
      - { item: item_equip_0298 }       # T8 cape (accessories.yaml)
    # No arc-1 tail: DROPS §6 pools carry only the region-band tiers, and R9 is Lv 40-55 (T7-T8).
    # Boss uniques (item_equip_0217-0222) are NOT in pools (DROPS §6, rule 10). Weight omitted =
