id: drop_raid_bonus_mainspring
schema: 20_schemas/drop_table.schema.md
references: [DROPS, ITEMS, RAID, SCROLLS]
# Bonus-room reactor table for raid_mainspring (10_systems/social/RAID.md §6.E) -- the third drop-table
# shape alongside drop_mob_NNN and pools.yaml (20_schemas/drop_table.schema.md). Its `owner` is a
# raid token, not a mob: every reactor in map_326 rolls this table independently on harvest.
owner: raid_mainspring
rows:
  # shards, guaranteed -- the floor that makes every node worth hitting (RAID.md §6.E).
  # DROPS §3: mean_shards_normal(40) = round(1.5*40 + 3) = 63; range = [round(0.8*mean), round(1.2*mean)].
  # normal-tier value used as a per-NODE figure (a reactor is not a monster and has no tier);
  # first-pass, flagged in RAID.md Open Questions alongside the unauthored node count.
  - { ref: shards, chance: guaranteed, qty_min: 50, qty_max: 76 }
  # --- ROWS PENDING THEIR ITEM SKUs -------------------------------------------------------
  # The remaining RAID.md §6.E rows cannot be authored yet: their SKUs are registered in
  # docs/ID_REGISTRY.md but UNAUTHORED as content, and an unresolved ref is a VALIDATION §2
  # failure. They land in the same batch as the items themselves, per this schema's batch-order
  # rule. Shape is fixed by RAID.md §6.E and is NOT restated as design here:
  #   - { ref: <item_use_0061-0078, steady scroll>,   chance: uncommon, qty_min: 1, qty_max: 1 }
  #   - { ref: <item_use_0021-0060, raid consumable>, chance: uncommon, qty_min: 1, qty_max: 1 }
  #   - { ref: <item_use_0061-0078, bold scroll>,     chance: rare,     qty_min: 1, qty_max: 1 }
  #   - { ref: item_etc_0178,                       chance: rare,     qty_min: 1, qty_max: 1 }  # Mainspring Cog
  #   - { ref: <item_use_0061-0078, perilous scroll>, chance: epic,     qty_min: 1, qty_max: 1 }
